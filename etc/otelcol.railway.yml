extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: sauron
          scrape_interval: 15s
          static_configs:
            - targets: ["sauron-worker-v3.railway.internal:9102"]

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64

  resource/tee_router:
    attributes:
      - key: service.namespace
        value: tee-router
        action: upsert
      - key: deployment.environment
        value: alpha
        action: upsert

  batch:

exporters:
  otlp_http/betterstack:
    endpoint: https://s2403167.us-east-9.betterstackdata.com
    headers:
      Authorization: Bearer ${env:BETTERSTACK_SOURCE_TOKEN}
    compression: gzip

service:
  extensions: [health_check]

  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, resource/tee_router, batch]
      exporters: [otlp_http/betterstack]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/tee_router, batch]
      exporters: [otlp_http/betterstack]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/tee_router, batch]
      exporters: [otlp_http/betterstack]
