# Shared local router infrastructure.
#
# This file intentionally contains no chain reality: no devnet service, no fake
# provider URLs, and no live RPC credentials. Compose it with exactly one
# environment overlay:
#   - etc/compose.local-devnet.yml for the deterministic local devnet
#   - etc/compose.live-local.yml for real networks / real funds

# Standard postgres tuning for non-source-of-truth databases. Trades durability
# (synchronous_commit=off — can lose ~few seconds of writes on crash) for write
# throughput (no per-commit fsync stall on the WAL lock). Safe for any DB whose
# data is reconstructible: indexer cursors, observation snapshots, analytics
# rollups, etc. NOT applied to router-postgres which holds the source of truth.
x-postgres-reconstructible-command: &postgres-reconstructible-command
  - postgres
  - -c
  - max_connections=400
  - -c
  - shared_buffers=1GB
  - -c
  - effective_cache_size=4GB
  - -c
  - work_mem=16MB
  - -c
  - maintenance_work_mem=256MB
  - -c
  - max_wal_size=2GB
  - -c
  - checkpoint_completion_target=0.9
  - -c
  - random_page_cost=1.1
  - -c
  - effective_io_concurrency=200
  - -c
  - synchronous_commit=off

x-temporal-server-base: &temporal-server-base
  image: temporalio/server:1.31.0
  depends_on:
    temporal-pg-secret-generator:
      condition: service_completed_successfully
    temporal-schema:
      condition: service_completed_successfully
  environment: &temporal-server-env
    DB: postgres12
    DB_PORT: 5432
    POSTGRES_USER: temporal
    # POSTGRES_PWD is exported at start from the generated secret file (see command).
    POSTGRES_SEEDS: temporal-postgres
    BIND_ON_IP: 0.0.0.0
    DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    NUM_HISTORY_SHARDS: "512"
    # Per Temporal community: SQL_MAX_CONNS is per-service. With 4 services
    # (frontend, history, matching, internal-worker) at 200 each, peak ~800
    # connections to temporal-postgres. max_connections below sized accordingly.
    SQL_MAX_CONNS: "200"
    SQL_MAX_IDLE_CONNS: "200"
    SQL_MAX_CONN_TIME: "30m"
    PROMETHEUS_ENDPOINT: 0.0.0.0:9090
  configs:
    - source: temporal-dynamic-config
      target: /etc/temporal/config/dynamicconfig/development-sql.yaml
  volumes:
    - router_local_temporal_postgres_secrets:/run/temporal-secrets:ro
  entrypoint: ["/bin/sh", "-c"]
  command:
    - |
      set -e
      POSTGRES_PWD="$$(tr -d '\n\r' < /run/temporal-secrets/temporal_password.txt)"
      export POSTGRES_PWD
      TEMPORAL_BROADCAST_ADDRESS="$$(getent hosts $$(hostname) | awk '{print $$1}')"
      export TEMPORAL_BROADCAST_ADDRESS
      echo "Resolved TEMPORAL_BROADCAST_ADDRESS=$$TEMPORAL_BROADCAST_ADDRESS for $$(hostname)"
      exec /etc/temporal/entrypoint.sh

configs:
  router-postgres-hba:
    content: |
      local all all trust
      host all all 127.0.0.1/32 scram-sha-256
      host all all ::1/128 scram-sha-256
      host all all all scram-sha-256
      host replication replicator all scram-sha-256

  router-postgres-init:
    content: |
      #!/bin/sh
      set -eu

      psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_DB" <<-SQL
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'replicator') THEN
            CREATE ROLE replicator LOGIN REPLICATION PASSWORD 'replicator';
          ELSE
            ALTER ROLE replicator WITH LOGIN REPLICATION PASSWORD 'replicator';
          END IF;
        END
        \$\$;
      SQL

  temporal-dynamic-config:
    content: |
      limit.maxIDLength:
        - value: 255
          constraints: {}
      system.forceSearchAttributesCacheRefreshOnRead:
        - value: true
          constraints: {}

      # Throughput ceilings -- raise from defaults (frontend 2400 / matching 1200 / history 3000)
      frontend.rps:
        - value: 4800
          constraints: {}
      matching.rps:
        - value: 2400
          constraints: {}
      history.rps:
        - value: 6000
          constraints: {}

      # Persistence QPS ceilings -- raise from defaults (frontend 2000 / matching+history 9000)
      frontend.persistenceMaxQPS:
        - value: 4000
          constraints: {}
      matching.persistenceMaxQPS:
        - value: 18000
          constraints: {}
      history.persistenceMaxQPS:
        - value: 18000
          constraints: {}

      # Task queue partitions -- raise from default 4 to match poller concurrency (~64-128)
      matching.numTaskqueueReadPartitions:
        - value: 16
          constraints: {}
      matching.numTaskqueueWritePartitions:
        - value: 16
          constraints: {}

      # Host-level history cache (entries). Was history.cacheMaxSize pre-1.27.
      # Default is 128000; bumping to 256000 to reduce shard reload churn under sustained load.
      history.hostLevelCacheMaxSize:
        - value: 256000
          constraints: {}
      history.eventsCacheMaxSizeBytes:
        - value: 1073741824   # 1 GiB
          constraints: {}

  temporal-setup-postgres:
    content: |
      #!/bin/sh
      set -eu

      : "$${POSTGRES_SEEDS:?POSTGRES_SEEDS is required}"
      : "$${POSTGRES_USER:?POSTGRES_USER is required}"

      echo "Waiting for PostgreSQL port..."
      nc -z -w 10 "$${POSTGRES_SEEDS}" "$${DB_PORT:-5432}"
      echo "PostgreSQL port is available"

      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal create
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal setup-schema -v 0.0
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal update-schema -d /etc/temporal/schema/postgresql/v12/temporal/versioned

      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility create
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility setup-schema -v 0.0
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility update-schema -d /etc/temporal/schema/postgresql/v12/visibility/versioned

      echo "PostgreSQL schema setup complete"

  temporal-create-namespace:
    content: |
      #!/bin/sh
      set -eu

      namespace="$${DEFAULT_NAMESPACE:-default}"
      temporal_address="$${TEMPORAL_ADDRESS:-temporal:7233}"
      max_attempts="$${TEMPORAL_HEALTH_CHECK_MAX_ATTEMPTS:-30}"
      sleep_seconds="$${TEMPORAL_HEALTH_CHECK_SLEEP_SECONDS:-5}"
      server_host="$$(echo "$${temporal_address}" | cut -d: -f1)"
      server_port="$$(echo "$${temporal_address}" | cut -d: -f2)"

      echo "Waiting for Temporal server port..."
      attempt=1
      while ! nc -z -w 10 "$${server_host}" "$${server_port}"; do
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Temporal server port did not become available after $${max_attempts} attempts"
          exit 1
        fi
        echo "Temporal server port not ready yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

      echo "Waiting for Temporal server health..."
      attempt=1
      while ! temporal operator cluster health --address "$${temporal_address}"; do
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Temporal server did not become healthy after $${max_attempts} attempts"
          exit 1
        fi
        echo "Temporal server not healthy yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

      echo "Ensuring Temporal namespace '$${namespace}' exists..."
      attempt=1
      while :; do
        if temporal operator namespace describe --namespace "$${namespace}" --address "$${temporal_address}" >/dev/null 2>&1; then
          echo "Namespace '$${namespace}' already exists"
          break
        fi
        if temporal operator namespace create --namespace "$${namespace}" --address "$${temporal_address}" >/dev/null 2>&1; then
          echo "Namespace '$${namespace}' created"
          break
        fi
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Failed to create namespace '$${namespace}' after $${max_attempts} attempts"
          exit 1
        fi
        echo "Namespace operation not ready yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

services:
  temporal-pg-secret-generator:
    image: alpine:3.22.1
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /secrets
        if [ ! -f /secrets/temporal_password.txt ]; then
          apk add --no-cache openssl >/dev/null
          umask 077
          tmp="$$(mktemp /secrets/temporal_password.txt.XXXXXX)"
          openssl rand -hex 32 | tr -d '\n' > "$$tmp"
          chmod 644 "$$tmp"
          mv "$$tmp" /secrets/temporal_password.txt
          echo "Generated Temporal Postgres password"
        else
          echo "Temporal Postgres password already exists"
        fi
        chmod 644 /secrets/temporal_password.txt
    volumes:
      - router_local_temporal_postgres_secrets:/secrets
    restart: "no"

  router-master-key-init:
    image: alpine:3.22.1
    command:
      - /bin/sh
      - -ec
      - |
        : "$${ROUTER_LOCAL_MASTER_KEY_HEX:?ROUTER_LOCAL_MASTER_KEY_HEX is required}"
        case "$${ROUTER_LOCAL_MASTER_KEY_HEX}" in
          0x*) key_value="$${ROUTER_LOCAL_MASTER_KEY_HEX#0x}" ;;
          *) key_value="$${ROUTER_LOCAL_MASTER_KEY_HEX}" ;;
        esac
        if ! printf '%s' "$${key_value}" | grep -Eq '^[0-9a-fA-F]{128}$'; then
          echo "ROUTER_LOCAL_MASTER_KEY_HEX must be exactly 64 bytes / 128 hex characters" >&2
          exit 1
        fi
        mkdir -p /run/router-secrets
        key=/run/router-secrets/router-master-key.hex
        if [ -f "$$key" ]; then
          existing="$$(tr -d '\n\r' < "$$key")"
          if [ "$${existing}" != "$${key_value}" ]; then
            echo "Existing router master key volume does not match ROUTER_LOCAL_MASTER_KEY_HEX" >&2
            echo "Use the matching env file or run compose down -v for this isolated stack." >&2
            exit 1
          fi
        else
          printf '%s' "$${key_value}" > "$$key"
          chmod 600 "$$key"
        fi
    volumes:
      - router_local_master_key:/run/router-secrets
    restart: "no"

  router-postgres:
    image: postgres:18-alpine
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - max_connections=400
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - synchronous_commit=on
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=6GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - checkpoint_timeout=15min
      - -c
      - max_wal_size=4GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
    environment:
      POSTGRES_USER: router_app
      POSTGRES_PASSWORD: router_app
      POSTGRES_DB: router_db
    ports:
      - "55432:5432"
    configs:
      - source: router-postgres-init
        target: /docker-entrypoint-initdb.d/001-router-init.sh
        mode: 0755
      - source: router-postgres-hba
        target: /etc/postgresql/pg_hba.conf
    volumes:
      - router_local_postgres_primary:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U router_app -d router_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  # numHistoryShards is fixed at first server start; changing it requires resetting the Temporal Postgres volume.
  temporal-postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - max_connections=1200
      - -c
      - shared_buffers=4GB
      - -c
      - effective_cache_size=12GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - max_wal_size=4GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_compression=on
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - synchronous_commit=off
    depends_on:
      temporal-pg-secret-generator:
        condition: service_completed_successfully
    environment:
      # One-time generated by temporal-pg-secret-generator (mirrors phala).
      POSTGRES_PASSWORD_FILE: /run/temporal-secrets/temporal_password.txt
      POSTGRES_USER: temporal
    ports:
      - "55435:5432"
    volumes:
      - router_local_temporal_postgres:/var/lib/postgresql/data
      - router_local_temporal_postgres_secrets:/run/temporal-secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  temporal-schema:
    image: temporalio/admin-tools:1.31.0
    restart: "no"
    depends_on:
      temporal-pg-secret-generator:
        condition: service_completed_successfully
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_SEEDS: temporal-postgres
    volumes:
      - router_local_temporal_postgres_secrets:/run/temporal-secrets:ro
    configs:
      - source: temporal-setup-postgres
        target: /scripts/setup-postgres.sh
        mode: 0555
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        PWD_VAL="$$(tr -d '\n\r' < /run/temporal-secrets/temporal_password.txt)"
        export POSTGRES_PWD="$$PWD_VAL"
        export SQL_PASSWORD="$$PWD_VAL"
        exec /scripts/setup-postgres.sh

  temporal-history:
    <<: *temporal-server-base
    environment:
      <<: *temporal-server-env
      SERVICES: history
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7234"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "13"

  temporal-matching:
    <<: *temporal-server-base
    environment:
      <<: *temporal-server-env
      SERVICES: matching
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7235"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "8"

  # This is Temporal's internal worker service, distinct from the app's Rust temporal-worker.
  temporal-internal-worker:
    <<: *temporal-server-base
    environment:
      <<: *temporal-server-env
      SERVICES: worker
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7239"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "3"

  temporal:
    <<: *temporal-server-base
    environment:
      <<: *temporal-server-env
      SERVICES: frontend
    ports:
      - "7233:7233"
      - "19090:9090"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "8"

  temporal-create-namespace:
    image: temporalio/admin-tools:1.31.0
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: default
    configs:
      - source: temporal-create-namespace
        target: /scripts/create-namespace.sh
        mode: 0555
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh

  temporal-ui:
    image: ghcr.io/riftresearch/tee-router-temporal-ui:local
    build:
      context: ..
      dockerfile: etc/Dockerfile.temporal-ui
      args:
        TEMPORAL_UI_VERSION: 2.50.0
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
      TEMPORAL_CODEC_DECODE_EVENT_HISTORY_DOWNLOAD: "true"
    ports:
      - "8080:8080"

  router-api:
    build:
      context: ..
      dockerfile: etc/Dockerfile.router-server
    command: ["router-api", "--host", "0.0.0.0", "--port", "4522"]
    depends_on:
      router-master-key-init:
        condition: service_completed_successfully
      router-postgres:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
    environment: &router_env
      RUST_LOG: info
      DATABASE_URL: postgres://router_app:router_app@router-postgres:5432/router_db
      DB_MAX_CONNECTIONS: "100"
      SAURON_TEMPORAL_DB_MAX_CONNECTIONS: "200"
      SAURON_TEMPORAL_TARGET_MEM_USAGE: "0.8"
      SAURON_TEMPORAL_TARGET_CPU_USAGE: "0.9"
      SAURON_TEMPORAL_MAX_CACHED_WORKFLOWS: "2000"
      ROUTER_MASTER_KEY_PATH: /run/router-secrets/router-master-key.hex
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: default
      ORDER_EXECUTION_TEMPORAL_TASK_QUEUE: tee-router-order-execution
      TEMPORAL_TASK_QUEUE: tee-router-order-execution
      CORS_DOMAIN: "*"
    volumes:
      - router_local_master_key:/run/router-secrets:ro
    ports:
      - "4522:4522"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4522/status >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 40

  router-worker:
    build:
      context: ..
      dockerfile: etc/Dockerfile.router-server
    command: ["router-worker"]
    depends_on:
      router-api:
        condition: service_healthy
    environment:
      <<: *router_env
      ROUTER_WORKER_ID: local-router-worker
      ROUTER_WORKER_ROUTE_COST_REFRESH_SECONDS: 30
    volumes:
      - router_local_master_key:/run/router-secrets:ro

  temporal-worker:
    build:
      context: ..
      dockerfile: etc/Dockerfile.temporal-worker
    command: ["worker"]
    depends_on:
      router-master-key-init:
        condition: service_completed_successfully
      router-postgres:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
    environment:
      <<: *router_env
      RUST_LOG: info
      ROUTER_PAYMASTER_BATCH_MAX_SIZE: 64
      ROUTER_TEMPORAL_ACTIVITY_POLLERS: "128"
      ROUTER_TEMPORAL_WORKFLOW_POLLERS: "32"
      ROUTER_TEMPORAL_ACTIVITY_SLOT_MIN: "64"
      ROUTER_TEMPORAL_ACTIVITY_SLOT_MAX: "2000"
      ROUTER_TEMPORAL_WORKFLOW_SLOT_MIN: "16"
      ROUTER_TEMPORAL_WORKFLOW_SLOT_MAX: "2000"
    volumes:
      - router_local_master_key:/run/router-secrets:ro
    expose:
      - "9103"

  router-postgres-replica:
    build:
      context: ..
      dockerfile: railway/router-physical-standby/Dockerfile
    depends_on:
      router-postgres:
        condition: service_healthy
    environment:
      PRIMARY_DB_HOST: router-postgres
      PRIMARY_DB_PORT: 5432
      PRIMARY_DB_NAME: router_db
      PRIMARY_DB_USER: replicator
      PRIMARY_DB_PASSWORD: replicator
      PRIMARY_DB_SSLMODE: disable
      PRIMARY_REPLICATION_SLOT: router_local_physical_standby
      STANDBY_APPLICATION_NAME: router-local-physical-standby
      STANDBY_MAX_CONNECTIONS: 400
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "55433:5432"
    volumes:
      - router_local_physical_standby:/var/lib/postgresql
    healthcheck:
      # Verify replication has caught up enough that downstream consumers (Sauron)
      # can find the tables they query at startup. `pg_isready` alone marks the
      # replica healthy as soon as Postgres accepts connections, which races
      # ahead of the streamed schema and crashes Sauron.
      test:
        - CMD-SHELL
        - pg_isready -U router_app -d router_db && psql -U router_app -d router_db -tAc "SELECT to_regclass('public.limit_order_quotes') IS NOT NULL" | grep -qx t
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  sauron-state-db:
    image: postgres:16-alpine
    command: *postgres-reconstructible-command
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sauron_state
    volumes:
      - router_local_sauron_state_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sauron_state"]
      interval: 5s
      timeout: 5s
      retries: 20

  sauron:
    build:
      context: ..
      dockerfile: etc/Dockerfile.sauron
    restart: on-failure
    depends_on:
      router-postgres-replica:
        condition: service_healthy
      sauron-state-db:
        condition: service_healthy
      hl-shim-indexer:
        condition: service_started
      evm-receipt-watcher-ethereum:
        condition: service_started
      evm-receipt-watcher-base:
        condition: service_started
      evm-receipt-watcher-arbitrum:
        condition: service_started
      bitcoin-indexer:
        condition: service_started
      bitcoin-receipt-watcher:
        condition: service_started
    environment:
      RUST_LOG: info
      ROUTER_REPLICA_DATABASE_URL: postgres://router_app:router_app@router-postgres-replica:5432/router_db
      SAURON_STATE_DATABASE_URL: postgres://postgres:postgres@sauron-state-db:5432/sauron_state
      SAURON_REPLICA_EVENT_SOURCE: cdc
      SAURON_CDC_SLOT_NAME: sauron_watch_cdc
      ROUTER_CDC_PUBLICATION_NAME: router_cdc_publication
      ROUTER_CDC_MESSAGE_PREFIX: rift.router.change
      SAURON_BITCOIN_SCAN_INTERVAL_SECONDS: 2
      ROUTER_INTERNAL_BASE_URL: http://router-api:4522
      ETHEREUM_RECEIPT_WATCHER_URL: http://evm-receipt-watcher-ethereum:8080
      BASE_RECEIPT_WATCHER_URL: http://evm-receipt-watcher-base:8080
      ARBITRUM_RECEIPT_WATCHER_URL: http://evm-receipt-watcher-arbitrum:8080
      BITCOIN_INDEXER_URL: http://bitcoin-indexer:8080
      BITCOIN_RECEIPT_WATCHER_URL: http://bitcoin-receipt-watcher:8080
      HL_SHIM_INDEXER_URL: http://hl-shim-indexer:8080
      SAURON_HL_BRIDGE_MATCH_WINDOW_SECONDS: 1800
      SAURON_HU_POLL_FAST_MILLIS: 500
      SAURON_HU_POLL_MEDIUM_MILLIS: 500
      SAURON_HU_POLL_SLOW_MILLIS: 500

  hl-shim-db:
    image: postgres:16-alpine
    command: *postgres-reconstructible-command
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hl_shim
    volumes:
      - router_local_hl_shim_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hl_shim"]
      interval: 5s
      timeout: 5s
      retries: 20

  hl-shim-indexer:
    build:
      context: ..
      dockerfile: etc/Dockerfile.hl-shim-indexer
    restart: on-failure
    depends_on:
      hl-shim-db:
        condition: service_healthy
    environment:
      RUST_LOG: info
      HL_SHIM_DATABASE_URL: postgres://postgres:postgres@hl-shim-db:5432/hl_shim
      HL_SHIM_BIND: 0.0.0.0:8080
      METRICS_BIND_ADDR: 0.0.0.0:9104
    expose:
      - "8080"
      - "9104"

  evm-receipt-watcher-ethereum:
    build:
      context: ..
      dockerfile: etc/Dockerfile.evm-receipt-watcher
    restart: on-failure
    environment:
      RUST_LOG: info
      EVM_RECEIPT_WATCHER_CHAIN: ethereum
      EVM_RECEIPT_WATCHER_BIND: 0.0.0.0:8080
      EVM_RECEIPT_WATCHER_POLL_INTERVAL_MS: 1000
    ports:
      - "50113:8080"
    expose:
      - "8080"

  evm-receipt-watcher-base:
    build:
      context: ..
      dockerfile: etc/Dockerfile.evm-receipt-watcher
    restart: on-failure
    environment:
      RUST_LOG: info
      EVM_RECEIPT_WATCHER_CHAIN: base
      EVM_RECEIPT_WATCHER_BIND: 0.0.0.0:8080
      EVM_RECEIPT_WATCHER_POLL_INTERVAL_MS: 1000
    ports:
      - "50114:8080"
    expose:
      - "8080"

  evm-receipt-watcher-arbitrum:
    build:
      context: ..
      dockerfile: etc/Dockerfile.evm-receipt-watcher
    restart: on-failure
    environment:
      RUST_LOG: info
      EVM_RECEIPT_WATCHER_CHAIN: arbitrum
      EVM_RECEIPT_WATCHER_BIND: 0.0.0.0:8080
      EVM_RECEIPT_WATCHER_POLL_INTERVAL_MS: 1000
    ports:
      - "50115:8080"
    expose:
      - "8080"

  bitcoin-indexer:
    build:
      context: ..
      dockerfile: etc/Dockerfile.bitcoin-indexer
    restart: on-failure
    environment:
      RUST_LOG: info
      BITCOIN_INDEXER_BIND: 0.0.0.0:8080
      BITCOIN_INDEXER_POLL_INTERVAL_MS: 1000
    ports:
      - "50116:8080"
    expose:
      - "8080"

  bitcoin-receipt-watcher:
    build:
      context: ..
      dockerfile: etc/Dockerfile.bitcoin-receipt-watcher
    restart: on-failure
    environment:
      RUST_LOG: info
      BITCOIN_RECEIPT_WATCHER_BIND: 0.0.0.0:8080
      BITCOIN_RECEIPT_WATCHER_POLL_INTERVAL_MS: 1000
    ports:
      - "50117:8080"
    expose:
      - "8080"

  router-gateway-db:
    image: postgres:16-alpine
    command: *postgres-reconstructible-command
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: router_gateway
    volumes:
      - router_local_gateway_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d router_gateway"]
      interval: 5s
      timeout: 5s
      retries: 20

  router-gateway:
    build:
      context: ..
      dockerfile: railway/router-gateway/Dockerfile
    depends_on:
      router-api:
        condition: service_healthy
      router-gateway-db:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      ROUTER_INTERNAL_BASE_URL: http://router-api:4522
      ROUTER_GATEWAY_PUBLIC_BASE_URL: http://localhost:3001
      ROUTER_GATEWAY_DATABASE_URL: postgres://postgres:postgres@router-gateway-db:5432/router_gateway
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 40

  admin-dashboard-auth-db:
    image: postgres:16-alpine
    command: *postgres-reconstructible-command
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admin_dashboard_auth
    volumes:
      - router_local_admin_auth_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d admin_dashboard_auth"]
      interval: 5s
      timeout: 5s
      retries: 20

  admin-dashboard-analytics-db:
    image: postgres:16-alpine
    command: *postgres-reconstructible-command
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admin_dashboard_analytics
    volumes:
      - router_local_admin_analytics_db:/var/lib/postgresql/data
    ports:
      - "55434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d admin_dashboard_analytics"]
      interval: 5s
      timeout: 5s
      retries: 20

  admin-dashboard:
    build:
      context: ..
      dockerfile: railway/admin-dashboard/Dockerfile
    depends_on:
      router-postgres-replica:
        condition: service_healthy
      admin-dashboard-auth-db:
        condition: service_healthy
      admin-dashboard-analytics-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      ADMIN_DASHBOARD_PRODUCTION: "false"
      ADMIN_DASHBOARD_ALLOW_INSECURE_DEV_AUTH_BYPASS: "true"
      HOST: 0.0.0.0
      PORT: 3000
      BETTER_AUTH_URL: http://localhost:3000
      ADMIN_DASHBOARD_WEB_ORIGIN: http://localhost:3000
      ADMIN_DASHBOARD_AUTH_DATABASE_URL: postgres://postgres:postgres@admin-dashboard-auth-db:5432/admin_dashboard_auth
      ADMIN_DASHBOARD_REPLICA_DATABASE_URL: postgres://router_app:router_app@router-postgres-replica:5432/router_db
      ADMIN_DASHBOARD_ANALYTICS_DATABASE_URL: postgres://postgres:postgres@admin-dashboard-analytics-db:5432/admin_dashboard_analytics
      ADMIN_DASHBOARD_CDC_SLOT_NAME: admin_dashboard_orders_cdc
      ROUTER_CDC_PUBLICATION_NAME: router_cdc_publication
      ROUTER_CDC_MESSAGE_PREFIX: rift.router.change
      BETTER_AUTH_SECRET: local-admin-dashboard-secret-000000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SUPABASE_CHATS_URL: ${SUPABASE_CHATS_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_CHAT_ADMIN_SECRET: ${SUPABASE_CHAT_ADMIN_SECRET:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/status >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 40

volumes:
  router_local_master_key:
  router_local_postgres_primary:
  router_local_temporal_postgres:
  router_local_temporal_postgres_secrets:
  router_local_physical_standby:
  router_local_sauron_state_db:
  router_local_hl_shim_db:
  router_local_gateway_db:
  router_local_admin_auth_db:
  router_local_admin_analytics_db:
