    content: |
      global:
        scrape_interval: 15s
      scrape_configs:
        - job_name: prometheus
          static_configs:
            - targets:
                - prometheus:9090
        - job_name: node-exporter
          static_configs:
            - targets:
                - node-exporter:9100
        - job_name: cadvisor
          static_configs:
            - targets:
                - cadvisor:8080
        - job_name: otc-server
          static_configs:
            - targets:
                - otc-server:9000
        - job_name: rfq-server
          static_configs:
            - targets:
                - rfq-server:9000

  loki-config:
    content: |
      auth_enabled: false

      server:
        http_listen_port: 3100

      common:
        path_prefix: /loki
        storage:
          filesystem:
            chunks_directory: /loki/chunks
            rules_directory: /loki/rules
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory

      schema_config:
        configs:
          - from: 2020-10-24
            store: boltdb-shipper
            object_store: filesystem
            schema: v11
            index:
              prefix: index_
              period: 24h

      limits_config:
        retention_period: 720h
        ingestion_rate_mb: 10
        ingestion_burst_size_mb: 20

      compactor:
        working_directory: /loki/compactor
        shared_store: filesystem
        compaction_interval: 10m
        retention_enabled: true
        retention_delete_delay: 2h
        retention_delete_worker_count: 150

