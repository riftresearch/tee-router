  - TEMPORAL_TASK_QUEUE=${ORDER_EXECUTION_TEMPORAL_TASK_QUEUE:-tee-router-order-execution}
  # OTLP logs egress to the in-TEE Alloy sidecar (compose-internal only).
  - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
  - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://alloy:4318/v1/logs

# Temporal server is split into frontend/history/matching/internal-worker roles
# (mirrors compose.local-infra.yml; introduced in b54bdf0). All roles share
# this base; each overrides only SERVICES + its health port.
x-temporal-server-base: &temporal-server-base
  image: temporalio/server:1.31.0
  restart: unless-stopped
  depends_on:
    temporal-pg-secret-generator:
      condition: service_completed_successfully
    temporal-schema:
      condition: service_completed_successfully
  environment: &temporal-server-env
    DB: postgres12
    DB_PORT: 5432
    POSTGRES_USER: temporal
    # POSTGRES_PWD is exported at start from the generated secret file (see command).
    POSTGRES_SEEDS: temporal-postgres
    BIND_ON_IP: 0.0.0.0
    DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    NUM_HISTORY_SHARDS: "512"
    # SQL_MAX_CONNS is per-service. 4 roles x 200 => ~800 peak connections to
    # temporal-postgres; its max_connections is sized accordingly below.
    SQL_MAX_CONNS: "200"
    SQL_MAX_IDLE_CONNS: "200"
    SQL_MAX_CONN_TIME: "30m"
    PROMETHEUS_ENDPOINT: 0.0.0.0:9090
  configs:
    - source: temporal-dynamic-config
      target: /etc/temporal/config/dynamicconfig/development-sql.yaml
  volumes:
    - temporal_postgres_secrets:/run/temporal-secrets:ro
  entrypoint: ["/bin/sh", "-c"]
  command:
    - |
      set -e
      POSTGRES_PWD="$$(tr -d '\n\r' < /run/temporal-secrets/temporal_password.txt)"
      export POSTGRES_PWD
      TEMPORAL_BROADCAST_ADDRESS="$$(getent hosts $$(hostname) | awk '{print $$1}')"
      export TEMPORAL_BROADCAST_ADDRESS
      echo "Resolved TEMPORAL_BROADCAST_ADDRESS=$$TEMPORAL_BROADCAST_ADDRESS for $$(hostname)"
      exec /etc/temporal/entrypoint.sh
  networks:
    - router-network

services:
  pg-secret-generator:
    image: alpine:3.22.1
    container_name: router-pg-secret-generator
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /secrets
        if [ ! -f /secrets/app_user.txt ]; then
          printf '%s' 'router_app' > /secrets/app_user.txt
        fi
        if [ ! -f /secrets/app_password.txt ]; then
          apk add --no-cache openssl >/dev/null
          umask 077
          tmp="$$(mktemp /secrets/app_password.txt.XXXXXX)"
          openssl rand -hex 32 | tr -d '\n' > "$$tmp"
          chmod 600 "$$tmp"
          mv "$$tmp" /secrets/app_password.txt
          echo "Generated router app DB password"
        else
          echo "Router app DB password already exists"
        fi
    volumes:
      - router_postgres_secrets:/secrets
    restart: "no"
    networks:
      - router-network

  temporal-pg-secret-generator:
    image: alpine:3.22.1
    container_name: temporal-pg-secret-generator
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /secrets
        if [ ! -f /secrets/temporal_password.txt ]; then
          apk add --no-cache openssl >/dev/null
          umask 077
          tmp="$$(mktemp /secrets/temporal_password.txt.XXXXXX)"
          openssl rand -hex 32 | tr -d '\n' > "$$tmp"
          chmod 644 "$$tmp"
          mv "$$tmp" /secrets/temporal_password.txt
          echo "Generated Temporal Postgres password"
        else
          echo "Temporal Postgres password already exists"
        fi
        chmod 644 /secrets/temporal_password.txt
    volumes:
      - temporal_postgres_secrets:/secrets
    restart: "no"
    networks:
      - router-network

  router-master-key-init:
    image: alpine:3.22.1
    container_name: router-master-key-init
    command:
      - /bin/sh
      - -ec
      - |
        key=/run/router-secrets/router-master-key.hex
        mkdir -p /run/router-secrets
        if [ -f "$$key" ]; then
          if ! grep -Eq '^[0-9a-fA-F]{128}$$' "$$key"; then
            echo "Existing router master key is malformed" >&2
            exit 1
          fi
          chmod 600 "$$key"
          echo "Router master key already exists"
          exit 0
        fi
        apk add --no-cache openssl >/dev/null
        umask 077
        tmp="$$(mktemp /run/router-secrets/router-master-key.hex.XXXXXX)"
        openssl rand -hex 64 | tr -d '\n' > "$$tmp"
        chmod 600 "$$tmp"
        mv "$$tmp" "$$key"
        echo "Generated router master key"
    volumes:
      - router_master_key:/run/router-secrets
    restart: "no"
    networks:
      - router-network

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║ ⚠️⚠️⚠️  DANGER — DANGER — DANGER  ⚠️⚠️⚠️                                     ║
  # ║ ███████████████████████████████████████████████████████████████████████   ║
  # ║ THIS SIDECAR EXPORTS THE ROUTER MASTER KEY *OUT OF THE ENCLAVE*.           ║
  # ║ IT EXISTS ONLY FOR LOCAL / TESTING FUND RECOVERY.                          ║
  # ║                                                                            ║
  # ║   *** NOT FOR PRODUCTION.  NOT FOR PRODUCTION.  NOT FOR PRODUCTION. ***     ║
  # ║                                                                            ║
  # ║ ANYONE WHO CAN DECRYPT THIS EXPORT CONTROLS *EVERY* CUSTODY VAULT THE      ║
  # ║ ROUTER DERIVES FROM THE MASTER KEY. THIS DELIBERATELY DEFEATS THE ENTIRE   ║
  # ║ TEE SECURITY GUARANTEE. ITS PRESENCE IN A REAL DEPLOYMENT IS A CRITICAL    ║
  # ║ VULNERABILITY.                                                             ║
  # ║                                                                            ║
  # ║ >>>>>  DELETE THIS ENTIRE SERVICE BLOCK BEFORE ANY TRUE PRODUCTION  <<<<<  ║
  # ║ >>>>>  DELETE THIS ENTIRE SERVICE BLOCK BEFORE ANY TRUE PRODUCTION  <<<<<  ║
  # ║ >>>>>  DELETE THIS ENTIRE SERVICE BLOCK BEFORE ANY TRUE PRODUCTION  <<<<<  ║
  # ║                                                                            ║
  # ║ How it works: RSA-OAEP(SHA-256/MGF1-SHA-256)-encrypts the master key to a  ║
  # ║ PUBLIC key whose PRIVATE half lives ONLY in the operator's local           ║
  # ║ .secrets/router-master-key-export-private.pem. The ciphertext printed to   ║
  # ║ the Phala logs is therefore useless to anyone WITHOUT that private key.    ║
  # ║ Export + decrypt:                                                          ║
  # ║   phala cvms logs <cvm> --public-logs | grep ROUTER_MASTER_KEY_CIPHERTEXT  ║
  # ║   echo "<b64>" | openssl base64 -d -A \                                    ║
  # ║     | openssl pkeyutl -decrypt -inkey \                                    ║
  # ║         .secrets/router-master-key-export-private.pem \                    ║
  # ║         -pkeyopt rsa_padding_mode:oaep -pkeyopt rsa_oaep_md:sha256 \       ║
  # ║         -pkeyopt rsa_mgf1_md:sha256                                        ║
  # ║ ███████████████████████████████████████████████████████████████████████   ║
  # ║ ⚠️⚠️⚠️  REMOVE BEFORE PRODUCTION — SEE BANNER ABOVE  ⚠️⚠️⚠️                  ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  router-master-key-export:
    image: alpine:3.22.1
    container_name: router-master-key-export
    command:
      - /bin/sh
      - -ec
      - |
        # !!! NOT FOR PRODUCTION !!! EXPORTS THE ENCLAVE MASTER KEY !!! REMOVE BEFORE PROD !!!
        apk add --no-cache openssl >/dev/null
        key=/run/router-secrets/router-master-key.hex
        if [ ! -f "$$key" ]; then echo "ROUTER MASTER KEY NOT PRESENT — nothing to export" >&2; exit 1; fi
        # Public half of the operator-only export keypair (private half stays in .secrets/).
        echo "" \
          | openssl base64 -d -A > /tmp/export-pub.pem
        ct="$$(openssl pkeyutl -encrypt -pubin -inkey /tmp/export-pub.pem \
              -pkeyopt rsa_padding_mode:oaep -pkeyopt rsa_oaep_md:sha256 -pkeyopt rsa_mgf1_md:sha256 \
              -in "$$key" | openssl base64 -A)"
        echo "ROUTER_MASTER_KEY_CIPHERTEXT_B64=$$ct"
        echo "(NOT-FOR-PRODUCTION master key export emitted above; decrypt locally with the .secrets private key)"
    volumes:
      - router_master_key:/run/router-secrets:ro
    restart: "no"
    networks:
      - router-network
    depends_on:
      router-master-key-init:
        condition: service_completed_successfully
  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║ ⚠️  END router-master-key-export — DELETE THIS WHOLE BLOCK BEFORE PROD  ⚠️   ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝

  postgres:
    image: postgres:18-alpine
    container_name: router-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_USER: router_app
      POSTGRES_PASSWORD_FILE: /run/postgres-secrets/app_password.txt
      POSTGRES_DB: router_db
      POSTGRES_INITDB_ARGS: "--data-checksums"
      REPLICA_USER: replicator
      REPLICA_PASSWORD: ${POSTGRES_REPLICA_PASSWORD:?set POSTGRES_REPLICA_PASSWORD}
    volumes:
      - router_postgres_data:/var/lib/postgresql
      - router_postgres_secrets:/run/postgres-secrets:ro
    configs:
      - source: postgres-conf
        target: /etc/postgresql/postgresql.conf
      - source: postgres-hba
        target: /etc/postgresql/pg_hba.conf
      - source: postgres-init
        target: /docker-entrypoint-initdb.d/00-router-init.sh
        mode: 0755
    command:
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      pg-secret-generator:
        condition: service_completed_successfully
    networks:
      - router-network
      - router-replication-network

  postgres-replication-gateway:
    image: alpine:3.22.1
    container_name: router-postgres-replication-gateway
    restart: unless-stopped
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache socat >/dev/null
        exec socat TCP-LISTEN:5432,fork,reuseaddr TCP:postgres:5432
    ports:
      - "5432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - router-replication-network

  temporal-postgres:
    image: postgres:16-alpine
    container_name: temporal-postgres
    restart: unless-stopped
    depends_on:
      temporal-pg-secret-generator:
        condition: service_completed_successfully
    environment:
      # Password is one-time generated by temporal-pg-secret-generator into a
      # shared volume (mirrors the router pg-secret-generator pattern).
      POSTGRES_PASSWORD_FILE: /run/temporal-secrets/temporal_password.txt
      POSTGRES_USER: temporal
    # 4 Temporal roles x SQL_MAX_CONNS=200 => ~800 peak connections; the image
    # default max_connections=100 would be exhausted by the split topology.
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=4GB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - max_wal_size=2GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
      - temporal_postgres_secrets:/run/temporal-secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - router-network

  temporal-schema:
    image: temporalio/admin-tools:1.31.0
    container_name: temporal-schema
    restart: "no"
    depends_on:
      temporal-pg-secret-generator:
        condition: service_completed_successfully
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_SEEDS: temporal-postgres
    volumes:
      - temporal_postgres_secrets:/run/temporal-secrets:ro
    configs:
      - source: temporal-setup-postgres
        target: /scripts/setup-postgres.sh
        mode: 0555
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        PWD_VAL="$$(tr -d '\n\r' < /run/temporal-secrets/temporal_password.txt)"
        export POSTGRES_PWD="$$PWD_VAL"
        export SQL_PASSWORD="$$PWD_VAL"
        exec /scripts/setup-postgres.sh
    networks:
      - router-network

  temporal:
    <<: *temporal-server-base
    container_name: temporal
    environment:
      <<: *temporal-server-env
      SERVICES: frontend
    expose:
      - "7233"
      - "9090"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s

  temporal-history:
    <<: *temporal-server-base
    container_name: temporal-history
    environment:
      <<: *temporal-server-env
      SERVICES: history
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7234"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s

  temporal-matching:
    <<: *temporal-server-base
    container_name: temporal-matching
    environment:
      <<: *temporal-server-env
      SERVICES: matching
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7235"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s

  # Temporal's own internal worker role (distinct from the app's Rust temporal-worker service).
  temporal-internal-worker:
    <<: *temporal-server-base
    container_name: temporal-internal-worker
    environment:
      <<: *temporal-server-env
      SERVICES: worker
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7239"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s

  temporal-create-namespace:
    image: temporalio/admin-tools:1.31.0
    container_name: temporal-create-namespace
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
    configs:
      - source: temporal-create-namespace
        target: /scripts/create-namespace.sh
        mode: 0555
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh
    networks:
      - router-network

  router-api:
    image: ghcr.io/riftresearch/tee-router:0.2.33
    container_name: router-api
    restart: unless-stopped
    environment: *router-environment
    command:
      - /bin/sh
      - -ec
      - |
        DB_USER="$$(tr -d '\n\r' < /run/postgres-secrets/app_user.txt)"
        DB_PASS="$$(tr -d '\n\r' < /run/postgres-secrets/app_password.txt)"
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@postgres:5432/router_db"
        export METRICS_BIND_ADDR=0.0.0.0:9100
        exec /usr/local/bin/router-api --host 0.0.0.0 --port "$${ROUTER_API_PORT:-4522}"
    ports:
      - "4522:4522"
    expose:
      - "9100"
    volumes:
      - router_postgres_secrets:/run/postgres-secrets:ro
      - router_master_key:/run/router-secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
      router-master-key-init:
        condition: service_completed_successfully
    networks:
      - router-network

  router-worker:
    image: ghcr.io/riftresearch/tee-router:0.2.33
    container_name: router-worker
    restart: unless-stopped
    environment: *router-environment
    command:
      - /bin/sh
      - -ec
      - |
        DB_USER="$$(tr -d '\n\r' < /run/postgres-secrets/app_user.txt)"
        DB_PASS="$$(tr -d '\n\r' < /run/postgres-secrets/app_password.txt)"
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@postgres:5432/router_db"
        export METRICS_BIND_ADDR=0.0.0.0:9101
        exec /usr/local/bin/router-worker
    expose:
      - "9101"
    volumes:
      - router_postgres_secrets:/run/postgres-secrets:ro
      - router_master_key:/run/router-secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
      router-master-key-init:
        condition: service_completed_successfully
    networks:
      - router-network

  temporal-worker:
    image: ghcr.io/riftresearch/tee-router-temporal-worker:0.2.33
    container_name: temporal-worker
    restart: unless-stopped
    environment: *router-environment
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        DB_USER="$$(tr -d '\n\r' < /run/postgres-secrets/app_user.txt)"
        DB_PASS="$$(tr -d '\n\r' < /run/postgres-secrets/app_password.txt)"
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@postgres:5432/router_db"
        export METRICS_BIND_ADDR=0.0.0.0:9103
        export ROUTER_PAYMASTER_BATCH_MAX_SIZE=64
        export ROUTER_TEMPORAL_ACTIVITY_POLLERS=128
        export ROUTER_TEMPORAL_WORKFLOW_POLLERS=32
        export ROUTER_TEMPORAL_ACTIVITY_SLOT_MIN=64
        export ROUTER_TEMPORAL_ACTIVITY_SLOT_MAX=2000
        export ROUTER_TEMPORAL_WORKFLOW_SLOT_MIN=16
        export ROUTER_TEMPORAL_WORKFLOW_SLOT_MAX=2000
        exec /usr/local/bin/temporal-worker worker
    expose:
      - "9103"
    volumes:
      - router_postgres_secrets:/run/postgres-secrets:ro
      - router_master_key:/run/router-secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
      router-master-key-init:
        condition: service_completed_successfully
    networks:
      - router-network

  # In-TEE telemetry sidecar. Scrapes the core stack over the internal
  # compose network and receives OTLP logs from the Phala services, then
  # makes a single authenticated OTLP egress to alloy-v3 on Railway.
  # Egress only: no published ports, zero inbound to the TEE.
  alloy:
    image: grafana/alloy:latest  # TODO(hardening): pin a digest for prod
    container_name: router-alloy-sidecar
    restart: unless-stopped
    environment:
      - OBS_INGEST_TOKEN=${OBS_INGEST_TOKEN:?set OBS_INGEST_TOKEN}
      - ALLOY_V3_OTLP_URL=${ALLOY_V3_OTLP_URL:?set ALLOY_V3_OTLP_URL}
    configs:
      - source: phala-alloy-config
        target: /etc/alloy/config.alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    networks:
      - router-network

  # Temporal Web UI — internal only; reached through the basic-auth proxy.
  temporal-ui:
    image: ghcr.io/riftresearch/tee-router-temporal-ui:0.2.33
    container_name: temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_UI_PORT: "8080"
      TEMPORAL_CODEC_DECODE_EVENT_HISTORY_DOWNLOAD: "true"
    expose:
      - "8080"
    networks:
      - router-network

  # The only publicly exposed surface for the UI: Caddy enforcing HTTP basic
  # auth in front of temporal-ui.
  temporal-ui-proxy:
    image: caddy:2
    container_name: temporal-ui-proxy
    restart: unless-stopped
    depends_on:
      - temporal-ui
    environment:
      - TEMPORAL_UI_PW_HASH=${TEMPORAL_UI_PW_HASH:?set TEMPORAL_UI_PW_HASH}
    configs:
      - source: temporal-ui-caddyfile
        target: /etc/caddy/Caddyfile
    ports:
      - "8080:8080"
    networks:
      - router-network

networks:
  router-network:
    name: router-v3-private-network
    ipam:
      config:
        - subnet: 172.30.0.0/16
  router-replication-network:
    name: router-v3-replication-network
    ipam:
      config:
        - subnet: 172.31.0.0/16

volumes:
  router_postgres_data:
  router_postgres_secrets:
  router_master_key:
  temporal_postgres_data:
  temporal_postgres_secrets:
