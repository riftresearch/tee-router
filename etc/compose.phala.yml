  # here so the production posture is explicit/auditable in-file.
  - PRODUCTION=${PRODUCTION:-true}
  - SERVICE_NAMESPACE=tee-router
  - SERVICE_VERSION=${SERVICE_VERSION:-0.1.8}
  - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-100}
  - DB_MIN_CONNECTIONS=${DB_MIN_CONNECTIONS:-4}
