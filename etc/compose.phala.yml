services:
  pg-secret-generator:
    container_name: tee-pg-secret-generator
    image: alpine:3.22.1
    command: >
      sh -c "
        set -e;
        mkdir -p /secrets;
        # only generate once; idempotent across restarts
        if [ ! -f /secrets/app_user.txt ]; then
          echo 'otc_app' > /secrets/app_user.txt;
        fi;
        if [ ! -f /secrets/app_password.txt ]; then
          apk add --no-cache openssl >/dev/null;
          openssl rand -hex 32 | tr -d '\n' > /secrets/app_password.txt;
          echo 'Generated new app DB password';
        else
          echo 'App DB password already exists, skipping';
        fi
      "
    volumes:
      - pg_secrets:/secrets
    restart: "no"
    networks:
      - rift-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: tee-otc-postgres
    environment:
      # Superuser (also used by the application)
      POSTGRES_USER: otc_app
      POSTGRES_PASSWORD_FILE: /run/postgres-secrets/app_password.txt
      POSTGRES_DB: otc_db

      # Replication user credentials
      REPLICA_USER: replicator
      REPLICA_PASSWORD: ${POSTGRES_REPLICA_PASSWORD:?set POSTGRES_REPLICA_PASSWORD}
      # REPLICA_PASSWORD: temp_replica_user_password

      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - otc_postgres_data_v5:/var/lib/postgresql/data
      - pg_secrets:/run/postgres-secrets:ro
    configs:
      - source: postgres-conf
        target: /etc/postgresql/postgresql.conf
      - source: postgres-hba
        target: /etc/postgresql/pg_hba.conf
      - source: postgres-init.sh
        target: /docker-entrypoint-initdb.d/00-init.sh
        mode: 0755
    command:
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "5432:5432"
    depends_on:
      pg-secret-generator:
        condition: service_completed_successfully
    networks:
      - rift-network

  dozzle:
    container_name: tee-dozzle
    image: amir20/dozzle:latest
    environment:
      - DOZZLE_AUTH_PROVIDER=simple
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    configs:
      - source: dozzle_users
        target: /data/users.yml
    ports:
      - 8095:8080

  bitcoin-core:
    container_name: tee-bitcoin-core
    restart: unless-stopped
    build:
      context: .
      platforms:
        - linux/amd64
      dockerfile_inline: |
        FROM debian:trixie
        RUN apt-get update \
          && apt-get install -y --no-install-recommends \
             ca-certificates \
             curl \
             tar \
             bash \
             lz4 \
             wget \
             aria2 \
          && rm -rf /var/lib/apt/lists/*

        RUN useradd -m -u 1000 -s /bin/bash bitcoin \
          && mkdir -p /home/bitcoin/.bitcoin \
          && chown -R bitcoin:bitcoin /home/bitcoin/.bitcoin
        WORKDIR /opt/bitcoin
        RUN curl -fsSL "https://bitcoincore.org/bin/bitcoin-core-30.2/bitcoin-30.2-x86_64-linux-gnu.tar.gz" -o bitcoin.tar.gz \
          && tar -xzf bitcoin.tar.gz --strip-components=1 \
          && install -m 0755 -o root -g root -t /usr/local/bin bin/* \
          && rm -rf /opt/bitcoin

        EXPOSE 8332 8333
        VOLUME ["/home/bitcoin/.bitcoin"]
        USER bitcoin
        WORKDIR /home/bitcoin
        ENTRYPOINT ["/usr/local/bin/bitcoin-entrypoint.sh"]
    environment:
      BITCOIN_DATA_DIR: /home/bitcoin/.bitcoin
    command:
      - "-server=1"
      - "-txindex=1"
      - "-rpcbind=0.0.0.0"
      - "-rpcallowip=0.0.0.0/0"
      - "-rpcuser=user"
      - "-rpcpassword=pass"
      - "-datadir=/home/bitcoin/.bitcoin"
      - "-fallbackfee=0.0002"
    volumes:
      - bitcoin_data:/home/bitcoin/.bitcoin
    configs:
      - source: bitcoin-entrypoint
        target: /usr/local/bin/bitcoin-entrypoint.sh
        mode: 0755
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bitcoin-cli -rpcuser=user -rpcpassword=pass getblockchaininfo > /dev/null || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - rift-network
    platform: linux/amd64

  otc-server:
    image: riftresearch/otc-server:1.8.0
    restart: unless-stopped
    container_name: tee-otc-server
    depends_on:
      pg-secret-generator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      bitcoin-core:
        condition: service_started
    entrypoint: ["/usr/local/bin/otc-server-entrypoint.sh"]
    command: ["/app/otc-server", "--host", "0.0.0.0", "--port", "4422"]
    environment:
      GRANT_SUDO: yes
      # DATABASE_URL is constructed dynamically in the entrypoint from pg-sidecar
      RUST_LOG: info
      # Database connection pool configuration
      DB_MAX_CONNECTIONS: "128"
      DB_MIN_CONNECTIONS: "16"
      # Ethereum configuration
      EVM_RPC_URL: http://eth-helios:8190
      UNTRUSTED_ETHEREUM_TOKEN_INDEXER_URL: ${UNTRUSTED_ETHEREUM_TOKEN_INDEXER_URL}
      ETHEREUM_ALLOWED_TOKEN: "0xcbB7C0000aB88B473b1f5aFd9ef808440eed33Bf"
      # Base configuration
      BASE_RPC_URL: http://base-helios:8191
      UNTRUSTED_BASE_TOKEN_INDEXER_URL: ${UNTRUSTED_BASE_TOKEN_INDEXER_URL}
      BASE_ALLOWED_TOKEN: "0xcbB7C0000aB88B473b1f5aFd9ef808440eed33Bf"
      # Bitcoin configuration
      BITCOIN_RPC_URL: http://bitcoin-core:8332
      BITCOIN_RPC_AUTH: user:pass
      ELECTRUM_HTTP_SERVER_URL: ${UNTRUSTED_ELECTRUM_HTTP_SERVER_URL}
      BITCOIN_NETWORK: bitcoin
      # Server configuration
      CORS_DOMAIN: "*"
      CHAINALYSIS_HOST: ${CHAINALYSIS_HOST}
      CHAINALYSIS_TOKEN: ${CHAINALYSIS_TOKEN}
      ROUTER_MASTER_KEY_PATH: /app/config/router-server-master-key.hex
      DSTACK_SOCK_PATH: /var/run/dstack.sock
      METRICS_LISTEN_ADDR: 0.0.0.0:9000
      LOKI_URL: http://otc-loki:3100
    ports:
      - "4422:4422"
    expose:
      - "9000"
    networks:
      - rift-network
    volumes:
      - ${DSTACK_SOCK_PATH:-/var/run/dstack.sock}:/var/run/dstack.sock
      - otc_server_config_data:/app/config
      - pg_secrets:/run/postgres-secrets:ro
    configs:
      - source: otc-server-entrypoint
        target: /usr/local/bin/otc-server-entrypoint.sh
        mode: 0755
    platform: linux/amd64
    user: root

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: tee-node-exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/rootfs"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/rootfs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    # ports:
    # - "9100:9100"
    networks:
      - rift-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: tee-cadvisor
    restart: unless-stopped
    privileged: true
    #ports:
    #  - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - rift-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tee-prometheus
    restart: unless-stopped
    #ports:
    #  - "9090:9090"
    depends_on:
      node-exporter:
        condition: service_started
      cadvisor:
        condition: service_started
    volumes:
      - prometheus_data_v4:/prometheus
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - rift-network

  otc-loki:
    image: grafana/loki:2.9.10
    container_name: tee-otc-loki
    restart: unless-stopped
    # No port exposure needed - only accessed internally by grafana and otc-server
    volumes:
      - otc_loki_data:/loki
    configs:
      - source: loki-config
        target: /etc/loki/local-config.yaml
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    networks:
      - rift-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: tee-grafana
    restart: unless-stopped
    ports:
      - "3015:3000"
    depends_on:
      prometheus:
        condition: service_started
      otc-loki:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    configs:
      - source: grafana-datasource-grafv7
        target: /etc/grafana/provisioning/datasources/prometheus.yml
      - source: grafana-dashboard-provider-grafv7
        target: /etc/grafana/provisioning/dashboards/provider.yml
      - source: grafana-node-dashboard-grafv7
        target: /etc/grafana/provisioning/dashboards/tee-monitoring.json
    networks:
      - rift-network
    tmpfs:
      - /var/lib/grafana
      - /var/log/grafana

  eth-helios:
    image: riftresearch/helios:0.10.2-3
    container_name: tee-eth-helios
    restart: unless-stopped
    user: root

    environment:
      # Required — you must set this in your .env or shell
      HELIOS_ETHEREUM_EXECUTION_RPC: ${HELIOS_ETHEREUM_EXECUTION_RPC:?set HELIOS_ETHEREUM_EXECUTION_RPC}
      HELIOS_ETHEREUM_CONSENSUS_RPC: ${HELIOS_ETHEREUM_CONSENSUS_RPC:?set HELIOS_ETHEREUM_CONSENSUS_RPC}

    # the freezer-archive-from block was mined on 11/5/2025, one day before deployment of the otc-server container
    command: >
      ethereum
      --network mainnet
      --execution-rpc ${HELIOS_ETHEREUM_EXECUTION_RPC}
      --consensus-rpc ${HELIOS_ETHEREUM_CONSENSUS_RPC}
      --checkpoint 0x9f6bfa8015ffd20cf5bcb56c6eca13a4edfdcefd75c14f5599e5aeffa92a537c
      --rpc-port 8190
      --rpc-bind-ip 0.0.0.0
      --freezer-archive-from 23730000
      --data-dir /data

    volumes:
      - eth_helios_data_v2:/data

    networks:
      - rift-network

  base-helios:
    image: riftresearch/helios:0.10.2-3
    container_name: tee-base-helios
    restart: unless-stopped
    user: root

    environment:
      # Required — you must set this in your .env or shell
      HELIOS_BASE_EXECUTION_RPC: ${HELIOS_BASE_EXECUTION_RPC:?set HELIOS_BASE_EXECUTION_RPC}
      HELIOS_BASE_CONSENSUS_RPC: ${HELIOS_BASE_CONSENSUS_RPC:?set HELIOS_BASE_CONSENSUS_RPC}

    command: >
      opstack 
      --network base
      --execution-rpc ${HELIOS_BASE_EXECUTION_RPC}
      --consensus-rpc ${HELIOS_BASE_CONSENSUS_RPC}
      --rpc-port 8191
      --rpc-bind-ip 0.0.0.0
      --freezer-archive-from 38394000
      --data-dir /data

    volumes:
      - base_helios_data:/data

    networks:
      - rift-network

    ports:
      - "8191:8191" 

networks:
  rift-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  otc_postgres_data_v5:
  bitcoin_data:
  otc_server_config_data:
  prometheus_data_v4:
  otc_loki_data:
  pg_secrets:
  eth_helios_data_v2:
  base_helios_data:
