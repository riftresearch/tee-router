configs:
  postgres-conf:
    content: |
      # PostgreSQL primary config for the router Phala deployment.
      # Physical streaming replication carries schema and data to the Railway standby.
      # wal_level=logical is retained only so CDC consumers can decode router events from the standby.
      listen_addresses = '*'
      password_encryption = 'scram-sha-256'
      wal_level = logical
      max_wal_senders = 10
      max_replication_slots = 10
      hot_standby = on
      synchronous_commit = on
      shared_buffers = 256MB
      effective_cache_size = 1GB
      work_mem = 16MB
      maintenance_work_mem = 128MB
      checkpoint_timeout = 15min
      max_wal_size = 2GB
      random_page_cost = 1.1
      effective_io_concurrency = 200
      max_connections = 256
      log_connections = on
      log_disconnections = on
      log_statement = 'none'

  postgres-hba:
    content: |
      # TYPE  DATABASE      USER          ADDRESS       METHOD
      local   all           all                         scram-sha-256
      host    all           all           127.0.0.1/32  scram-sha-256
      host    all           all           ::1/128       scram-sha-256

      # Compose-network application traffic only.
      host    router_db     router_app    172.30.0.0/16 scram-sha-256

      # Physical replication traffic through the public replication proxy only.
      host    replication   replicator    172.31.0.0/16 scram-sha-256
      host    router_db     replicator    172.31.0.0/16 scram-sha-256

  postgres-init:
    content: |
      #!/bin/sh
      set -eu

      : "$${REPLICA_USER:?REPLICA_USER must be set}"
      : "$${REPLICA_PASSWORD:?REPLICA_PASSWORD must be set}"

      echo "Creating or updating physical replication role '$${REPLICA_USER}'"

      psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_DB" <<-SQL
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '$${REPLICA_USER}') THEN
            CREATE ROLE $${REPLICA_USER} LOGIN REPLICATION PASSWORD '$${REPLICA_PASSWORD}';
          ELSE
            ALTER ROLE $${REPLICA_USER} WITH LOGIN REPLICATION PASSWORD '$${REPLICA_PASSWORD}';
          END IF;
        END
        \$\$;
      SQL

      echo "Router Postgres init complete"

  temporal-dynamic-config:
    content: |
      limit.maxIDLength:
        - value: 255
          constraints: {}
      system.forceSearchAttributesCacheRefreshOnRead:
        - value: true
          constraints: {}

  temporal-setup-postgres:
    content: |
      #!/bin/sh
      set -eu

      : "$${POSTGRES_SEEDS:?POSTGRES_SEEDS is required}"
      : "$${POSTGRES_USER:?POSTGRES_USER is required}"

      echo "Waiting for PostgreSQL port..."
      nc -z -w 10 "$${POSTGRES_SEEDS}" "$${DB_PORT:-5432}"
      echo "PostgreSQL port is available"

      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal create
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal setup-schema -v 0.0
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal update-schema -d /etc/temporal/schema/postgresql/v12/temporal/versioned

      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility create
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility setup-schema -v 0.0
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility update-schema -d /etc/temporal/schema/postgresql/v12/visibility/versioned

      echo "PostgreSQL schema setup complete"

  temporal-create-namespace:
    content: |
      #!/bin/sh
      set -eu

      namespace="$${DEFAULT_NAMESPACE:-default}"
      temporal_address="$${TEMPORAL_ADDRESS:-temporal:7233}"
      max_attempts="$${TEMPORAL_HEALTH_CHECK_MAX_ATTEMPTS:-30}"
      sleep_seconds="$${TEMPORAL_HEALTH_CHECK_SLEEP_SECONDS:-5}"
      server_host="$$(echo "$${temporal_address}" | cut -d: -f1)"
      server_port="$$(echo "$${temporal_address}" | cut -d: -f2)"

      echo "Waiting for Temporal server port..."
      attempt=1
      while ! nc -z -w 10 "$${server_host}" "$${server_port}"; do
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Temporal server port did not become available after $${max_attempts} attempts"
          exit 1
        fi
        echo "Temporal server port not ready yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

      echo "Waiting for Temporal server health..."
      attempt=1
      while ! temporal operator cluster health --address "$${temporal_address}"; do
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Temporal server did not become healthy after $${max_attempts} attempts"
          exit 1
        fi
        echo "Temporal server not healthy yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

      echo "Ensuring Temporal namespace '$${namespace}' exists..."
      attempt=1
      while :; do
        if temporal operator namespace describe --namespace "$${namespace}" --address "$${temporal_address}" >/dev/null 2>&1; then
          echo "Namespace '$${namespace}' already exists"
          break
        fi
        if temporal operator namespace create --namespace "$${namespace}" --address "$${temporal_address}" >/dev/null 2>&1; then
          echo "Namespace '$${namespace}' created"
          break
        fi
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Failed to create namespace '$${namespace}' after $${max_attempts} attempts"
          exit 1
        fi
        echo "Namespace operation not ready yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

x-router-environment: &router-environment
  - RUST_LOG=${RUST_LOG:-info}
  - DEPLOYMENT_ENVIRONMENT=${DEPLOYMENT_ENVIRONMENT:-alpha}
  - SERVICE_NAMESPACE=tee-router
  - SERVICE_VERSION=${SERVICE_VERSION:-0.1.8}
  - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-32}
  - DB_MIN_CONNECTIONS=${DB_MIN_CONNECTIONS:-4}
  - ROUTER_MASTER_KEY_PATH=/run/router-secrets/router-master-key.hex
  - ETH_RPC_URL=${ETH_RPC_URL:?set ETH_RPC_URL}
  - BASE_RPC_URL=${BASE_RPC_URL:?set BASE_RPC_URL}
  - ARBITRUM_RPC_URL=${ARBITRUM_RPC_URL:?set ARBITRUM_RPC_URL}
  - BITCOIN_RPC_URL=${BITCOIN_RPC_URL:?set BITCOIN_RPC_URL}
  - BITCOIN_RPC_AUTH=${BITCOIN_RPC_AUTH:?set BITCOIN_RPC_AUTH}
  - ELECTRUM_HTTP_SERVER_URL=${ELECTRUM_HTTP_SERVER_URL:?set ELECTRUM_HTTP_SERVER_URL}
  - BITCOIN_NETWORK=bitcoin
  - BITCOIN_PAYMASTER_PRIVATE_KEY=${BITCOIN_PAYMASTER_PRIVATE_KEY:?set BITCOIN_PAYMASTER_PRIVATE_KEY}
  - ETHEREUM_PAYMASTER_PRIVATE_KEY=${ETHEREUM_PAYMASTER_PRIVATE_KEY:?set ETHEREUM_PAYMASTER_PRIVATE_KEY}
  - BASE_PAYMASTER_PRIVATE_KEY=${BASE_PAYMASTER_PRIVATE_KEY:?set BASE_PAYMASTER_PRIVATE_KEY}
  - ARBITRUM_PAYMASTER_PRIVATE_KEY=${ARBITRUM_PAYMASTER_PRIVATE_KEY:?set ARBITRUM_PAYMASTER_PRIVATE_KEY}
  - HYPERLIQUID_PAYMASTER_PRIVATE_KEY=${HYPERLIQUID_PAYMASTER_PRIVATE_KEY:?set HYPERLIQUID_PAYMASTER_PRIVATE_KEY}
  - EVM_PAYMASTER_VAULT_GAS_BUFFER_WEI=${EVM_PAYMASTER_VAULT_GAS_BUFFER_WEI:-0}
  - CHAINALYSIS_HOST=${CHAINALYSIS_HOST:?set CHAINALYSIS_HOST}
  - CHAINALYSIS_TOKEN=${CHAINALYSIS_TOKEN:?set CHAINALYSIS_TOKEN}
  - ROUTER_DETECTOR_API_KEY=${ROUTER_DETECTOR_API_KEY:?set ROUTER_DETECTOR_API_KEY}
  - ROUTER_GATEWAY_API_KEY=${ROUTER_GATEWAY_API_KEY:?set ROUTER_GATEWAY_API_KEY}
  - ROUTER_ADMIN_API_KEY=${ROUTER_ADMIN_API_KEY:?set ROUTER_ADMIN_API_KEY}
  - ACROSS_API_URL=https://app.across.to/api
  - ACROSS_API_KEY=${ACROSS_API_KEY:?set ACROSS_API_KEY}
  - HYPERUNIT_API_URL=https://api.hyperunit.xyz
  - HYPERUNIT_PROXY_URL=${HYPERUNIT_PROXY_URL:?set HYPERUNIT_PROXY_URL}
  - HYPERLIQUID_API_URL=https://api.hyperliquid.xyz
  - HYPERLIQUID_NETWORK=mainnet
  - HYPERLIQUID_ORDER_TIMEOUT_MS=${HYPERLIQUID_ORDER_TIMEOUT_MS:-30000}
  - VELORA_API_URL=https://api.paraswap.io
  - COINBASE_PRICE_API_BASE_URL=https://api.coinbase.com
  - ACROSS_INTEGRATOR_ID
  - CCTP_API_URL
  - CCTP_TOKEN_MESSENGER_V2_ADDRESS
  - CCTP_MESSAGE_TRANSMITTER_V2_ADDRESS
  - CORS_DOMAIN
  - VELORA_PARTNER
  - LOKI_URL
  - TEMPORAL_ADDRESS=http://temporal:7233
  - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
  - ORDER_EXECUTION_TEMPORAL_TASK_QUEUE=${ORDER_EXECUTION_TEMPORAL_TASK_QUEUE:-tee-router-order-execution}
  - TEMPORAL_TASK_QUEUE=${ORDER_EXECUTION_TEMPORAL_TASK_QUEUE:-tee-router-order-execution}

services:
  pg-secret-generator:
    image: alpine:3.22.1
    container_name: router-pg-secret-generator
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /secrets
        if [ ! -f /secrets/app_user.txt ]; then
          printf '%s' 'router_app' > /secrets/app_user.txt
        fi
        if [ ! -f /secrets/app_password.txt ]; then
          apk add --no-cache openssl >/dev/null
          umask 077
          tmp="$$(mktemp /secrets/app_password.txt.XXXXXX)"
          openssl rand -hex 32 | tr -d '\n' > "$$tmp"
          chmod 600 "$$tmp"
          mv "$$tmp" /secrets/app_password.txt
          echo "Generated router app DB password"
        else
          echo "Router app DB password already exists"
        fi
    volumes:
      - router_postgres_secrets:/secrets
    restart: "no"
    networks:
      - router-network

  router-master-key-init:
    image: alpine:3.22.1
    container_name: router-master-key-init
    command:
      - /bin/sh
      - -ec
      - |
        key=/run/router-secrets/router-master-key.hex
        mkdir -p /run/router-secrets
        if [ -f "$$key" ]; then
          if ! grep -Eq '^[0-9a-fA-F]{128}$$' "$$key"; then
            echo "Existing router master key is malformed" >&2
            exit 1
          fi
          chmod 600 "$$key"
          echo "Router master key already exists"
          exit 0
        fi
        apk add --no-cache openssl >/dev/null
        umask 077
        tmp="$$(mktemp /run/router-secrets/router-master-key.hex.XXXXXX)"
        openssl rand -hex 64 | tr -d '\n' > "$$tmp"
        chmod 600 "$$tmp"
        mv "$$tmp" "$$key"
        echo "Generated router master key"
    volumes:
      - router_master_key:/run/router-secrets
    restart: "no"
    networks:
      - router-network

  postgres:
    image: postgres:18-alpine
    container_name: router-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_USER: router_app
      POSTGRES_PASSWORD_FILE: /run/postgres-secrets/app_password.txt
      POSTGRES_DB: router_db
      POSTGRES_INITDB_ARGS: "--data-checksums"
      REPLICA_USER: replicator
      REPLICA_PASSWORD: ${POSTGRES_REPLICA_PASSWORD:?set POSTGRES_REPLICA_PASSWORD}
    volumes:
      - router_postgres_data:/var/lib/postgresql
      - router_postgres_secrets:/run/postgres-secrets:ro
    configs:
      - source: postgres-conf
        target: /etc/postgresql/postgresql.conf
      - source: postgres-hba
        target: /etc/postgresql/pg_hba.conf
      - source: postgres-init
        target: /docker-entrypoint-initdb.d/00-router-init.sh
        mode: 0755
    command:
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      pg-secret-generator:
        condition: service_completed_successfully
    networks:
      - router-network
      - router-replication-network

  postgres-replication-gateway:
    image: alpine:3.22.1
    container_name: router-postgres-replication-gateway
    restart: unless-stopped
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache socat >/dev/null
        exec socat TCP-LISTEN:5432,fork,reuseaddr TCP:postgres:5432
    ports:
      - "5432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - router-replication-network

  temporal-postgres:
    image: postgres:16-alpine
    container_name: temporal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD:?set TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_USER: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - router-network

  temporal-schema:
    image: temporalio/admin-tools:1.31.0
    container_name: temporal-schema
    restart: "no"
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: ${TEMPORAL_POSTGRES_PASSWORD:?set TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_SEEDS: temporal-postgres
      SQL_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD:?set TEMPORAL_POSTGRES_PASSWORD}
    configs:
      - source: temporal-setup-postgres
        target: /scripts/setup-postgres.sh
        mode: 0555
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres.sh
    networks:
      - router-network

  temporal:
    image: temporalio/server:1.31.0
    container_name: temporal
    restart: unless-stopped
    depends_on:
      temporal-schema:
        condition: service_completed_successfully
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: ${TEMPORAL_POSTGRES_PASSWORD:?set TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_SEEDS: temporal-postgres
      BIND_ON_IP: 0.0.0.0
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      PROMETHEUS_ENDPOINT: 0.0.0.0:9090
    expose:
      - "7233"
      - "9090"
    configs:
      - source: temporal-dynamic-config
        target: /etc/temporal/config/dynamicconfig/development-sql.yaml
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s
    networks:
      - router-network

  temporal-create-namespace:
    image: temporalio/admin-tools:1.31.0
    container_name: temporal-create-namespace
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
    configs:
      - source: temporal-create-namespace
        target: /scripts/create-namespace.sh
        mode: 0555
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh
    networks:
      - router-network

  router-api:
    image: ghcr.io/riftresearch/tee-router:0.1.8
    container_name: router-api
    restart: unless-stopped
    environment: *router-environment
    command:
      - /bin/sh
      - -ec
      - |
        DB_USER="$$(tr -d '\n\r' < /run/postgres-secrets/app_user.txt)"
        DB_PASS="$$(tr -d '\n\r' < /run/postgres-secrets/app_password.txt)"
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@postgres:5432/router_db"
        export METRICS_BIND_ADDR=0.0.0.0:9100
        exec /usr/local/bin/router-api --host 0.0.0.0 --port "$${ROUTER_API_PORT:-4522}"
    ports:
      - "4522:4522"
    expose:
      - "9100"
    volumes:
      - router_postgres_secrets:/run/postgres-secrets:ro
      - router_master_key:/run/router-secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
      router-master-key-init:
        condition: service_completed_successfully
    networks:
      - router-network

  router-worker:
    image: ghcr.io/riftresearch/tee-router:0.1.8
    container_name: router-worker
    restart: unless-stopped
    environment: *router-environment
    command:
      - /bin/sh
      - -ec
      - |
        DB_USER="$$(tr -d '\n\r' < /run/postgres-secrets/app_user.txt)"
        DB_PASS="$$(tr -d '\n\r' < /run/postgres-secrets/app_password.txt)"
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@postgres:5432/router_db"
        export METRICS_BIND_ADDR=0.0.0.0:9101
        exec /usr/local/bin/router-worker
    expose:
      - "9101"
    volumes:
      - router_postgres_secrets:/run/postgres-secrets:ro
      - router_master_key:/run/router-secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
      router-master-key-init:
        condition: service_completed_successfully
    networks:
      - router-network

  temporal-worker:
    image: ghcr.io/riftresearch/tee-router-temporal-worker:0.1.8
    container_name: temporal-worker
    restart: unless-stopped
    environment: *router-environment
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        DB_USER="$$(tr -d '\n\r' < /run/postgres-secrets/app_user.txt)"
        DB_PASS="$$(tr -d '\n\r' < /run/postgres-secrets/app_password.txt)"
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@postgres:5432/router_db"
        export METRICS_BIND_ADDR=0.0.0.0:9103
        exec /usr/local/bin/temporal-worker worker
    expose:
      - "9103"
    volumes:
      - router_postgres_secrets:/run/postgres-secrets:ro
      - router_master_key:/run/router-secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
      router-master-key-init:
        condition: service_completed_successfully
    networks:
      - router-network

networks:
  router-network:
    name: router-v3-private-network
    ipam:
      config:
        - subnet: 172.30.0.0/16
  router-replication-network:
    name: router-v3-replication-network
    ipam:
      config:
        - subnet: 172.31.0.0/16

volumes:
  router_postgres_data:
  router_postgres_secrets:
  router_master_key:
  temporal_postgres_data:
