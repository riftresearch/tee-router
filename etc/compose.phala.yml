  - CCTP_TOKEN_MESSENGER_V2_ADDRESS=0x28b5a0e9C621a5BadaA536219b3a228C8168cf5d
  - CCTP_MESSAGE_TRANSMITTER_V2_ADDRESS=0x81D40F21F12A8F0E3252Bccb954D722d4c464B64
  - CCTP_TRANSFER_MODE=${CCTP_TRANSFER_MODE:-standard}
