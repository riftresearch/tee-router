configs:
  postgres-conf:
    content: |
      # PostgreSQL primary config for the router Phala deployment.
      # Logical replication is required for the Railway read replica consumed by Sauron.
      listen_addresses = '*'
      password_encryption = 'scram-sha-256'
      wal_level = logical
      max_wal_senders = 10
      max_replication_slots = 10
      max_logical_replication_workers = 4
      max_sync_workers_per_subscription = 2
      hot_standby = on
      shared_buffers = 256MB
      work_mem = 16MB
      maintenance_work_mem = 128MB
      max_connections = 256
      log_connections = on
      log_disconnections = on
      log_statement = 'none'

  postgres-hba:
    content: |
      # TYPE  DATABASE      USER          ADDRESS       METHOD
      local   all           all                         scram-sha-256
      host    all           all           127.0.0.1/32  scram-sha-256
      host    all           all           ::1/128       scram-sha-256

      # Compose-network application traffic only.
      host    router_db     router_app    172.30.0.0/16 scram-sha-256

      # Physical/logical replication traffic through the public replication proxy only.
      host    replication   replicator    172.31.0.0/16 scram-sha-256
      host    router_db     replicator    172.31.0.0/16 scram-sha-256

  postgres-init:
    content: |
      #!/bin/sh
      set -eu

      : "$${REPLICA_USER:?REPLICA_USER must be set}"
      : "$${REPLICA_PASSWORD:?REPLICA_PASSWORD must be set}"

      echo "Creating or updating logical replication role '$${REPLICA_USER}'"

      psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_DB" <<-SQL
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '$${REPLICA_USER}') THEN
            CREATE ROLE $${REPLICA_USER} LOGIN REPLICATION PASSWORD '$${REPLICA_PASSWORD}';
          ELSE
            ALTER ROLE $${REPLICA_USER} WITH LOGIN REPLICATION PASSWORD '$${REPLICA_PASSWORD}';
          END IF;
        END
        \$\$;
      SQL

      psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_DB" <<-SQL
        CREATE SCHEMA IF NOT EXISTS public;

        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO $$POSTGRES_USER;
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO $$POSTGRES_USER;

        GRANT USAGE ON SCHEMA public TO $${REPLICA_USER};
        GRANT SELECT ON ALL TABLES IN SCHEMA public TO $${REPLICA_USER};
        GRANT USAGE ON ALL SEQUENCES IN SCHEMA public TO $${REPLICA_USER};
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO $${REPLICA_USER};
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE ON SEQUENCES TO $${REPLICA_USER};
      SQL

      echo "Creating router logical replication publication"
      psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_DB" <<-SQL
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT 1 FROM pg_publication WHERE pubname = 'router_all_tables') THEN
            CREATE PUBLICATION router_all_tables FOR ALL TABLES;
            RAISE NOTICE 'Created publication: router_all_tables';
          ELSE
            RAISE NOTICE 'Publication router_all_tables already exists';
          END IF;
        END
        \$\$;
      SQL

      echo "Router Postgres init complete"

  otel-collector-config:
    content: |
      extensions:
        health_check:
          endpoint: 0.0.0.0:13133

      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

        prometheus:
          config:
            scrape_configs:
              - job_name: router-api
                scrape_interval: 15s
                static_configs:
                  - targets: ["router-api:9100"]

              - job_name: router-worker
                scrape_interval: 15s
                static_configs:
                  - targets: ["router-worker:9101"]

      processors:
        memory_limiter:
          check_interval: 5s
          limit_mib: 256
          spike_limit_mib: 64

        resource/tee_router:
          attributes:
            - key: service.namespace
              value: tee-router
              action: upsert
            - key: deployment.environment
              value: alpha
              action: upsert

        batch:

      exporters:
        otlp_http/betterstack:
          endpoint: https://s2403167.us-east-9.betterstackdata.com
          headers:
            Authorization: Bearer $${env:BETTERSTACK_SOURCE_TOKEN}
          compression: gzip

      service:
        extensions: [health_check]

        pipelines:
          metrics:
            receivers: [otlp, prometheus]
            processors: [memory_limiter, resource/tee_router, batch]
            exporters: [otlp_http/betterstack]

          logs:
            receivers: [otlp]
            processors: [memory_limiter, resource/tee_router, batch]
            exporters: [otlp_http/betterstack]

          traces:
            receivers: [otlp]
            processors: [memory_limiter, resource/tee_router, batch]
            exporters: [otlp_http/betterstack]

x-router-environment: &router-environment
  - RUST_LOG=${RUST_LOG:-info}
  - DEPLOYMENT_ENVIRONMENT=${DEPLOYMENT_ENVIRONMENT:-alpha}
  - SERVICE_NAMESPACE=tee-router
  - SERVICE_VERSION=${SERVICE_VERSION:-0.1.9}
  - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
  - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-32}
  - DB_MIN_CONNECTIONS=${DB_MIN_CONNECTIONS:-4}
  - ROUTER_MASTER_KEY_PATH=/run/router-secrets/router-master-key.hex
  - ETH_RPC_URL=${ETH_RPC_URL:?set ETH_RPC_URL}
  - BASE_RPC_URL=${BASE_RPC_URL:?set BASE_RPC_URL}
  - ARBITRUM_RPC_URL=${ARBITRUM_RPC_URL:?set ARBITRUM_RPC_URL}
  - BITCOIN_RPC_URL=${BITCOIN_RPC_URL:?set BITCOIN_RPC_URL}
  - BITCOIN_RPC_AUTH=${BITCOIN_RPC_AUTH:?set BITCOIN_RPC_AUTH}
  - ELECTRUM_HTTP_SERVER_URL=${ELECTRUM_HTTP_SERVER_URL:?set ELECTRUM_HTTP_SERVER_URL}
  - BITCOIN_NETWORK=bitcoin
  - BITCOIN_PAYMASTER_PRIVATE_KEY=${BITCOIN_PAYMASTER_PRIVATE_KEY:?set BITCOIN_PAYMASTER_PRIVATE_KEY}
  - ETHEREUM_PAYMASTER_PRIVATE_KEY=${ETHEREUM_PAYMASTER_PRIVATE_KEY:?set ETHEREUM_PAYMASTER_PRIVATE_KEY}
  - BASE_PAYMASTER_PRIVATE_KEY=${BASE_PAYMASTER_PRIVATE_KEY:?set BASE_PAYMASTER_PRIVATE_KEY}
  - ARBITRUM_PAYMASTER_PRIVATE_KEY=${ARBITRUM_PAYMASTER_PRIVATE_KEY:?set ARBITRUM_PAYMASTER_PRIVATE_KEY}
  - HYPERLIQUID_PAYMASTER_PRIVATE_KEY=${HYPERLIQUID_PAYMASTER_PRIVATE_KEY:?set HYPERLIQUID_PAYMASTER_PRIVATE_KEY}
  - EVM_PAYMASTER_VAULT_GAS_BUFFER_WEI=${EVM_PAYMASTER_VAULT_GAS_BUFFER_WEI:-0}
  - CHAINALYSIS_HOST=${CHAINALYSIS_HOST:?set CHAINALYSIS_HOST}
  - CHAINALYSIS_TOKEN=${CHAINALYSIS_TOKEN:?set CHAINALYSIS_TOKEN}
  - ROUTER_DETECTOR_API_KEY=${ROUTER_DETECTOR_API_KEY:?set ROUTER_DETECTOR_API_KEY}
  - ROUTER_GATEWAY_API_KEY=${ROUTER_GATEWAY_API_KEY:?set ROUTER_GATEWAY_API_KEY}
  - ROUTER_ADMIN_API_KEY=${ROUTER_ADMIN_API_KEY:?set ROUTER_ADMIN_API_KEY}
  - ACROSS_API_URL=https://app.across.to/api
  - ACROSS_API_KEY=${ACROSS_API_KEY:?set ACROSS_API_KEY}
  - HYPERUNIT_API_URL=https://api.hyperunit.xyz
  - HYPERUNIT_PROXY_URL=${HYPERUNIT_PROXY_URL:?set HYPERUNIT_PROXY_URL}
  - HYPERLIQUID_API_URL=https://api.hyperliquid.xyz
  - HYPERLIQUID_NETWORK=mainnet
  - HYPERLIQUID_ORDER_TIMEOUT_MS=${HYPERLIQUID_ORDER_TIMEOUT_MS:-30000}
  - VELORA_API_URL=https://api.paraswap.io
  - COINBASE_PRICE_API_BASE_URL=https://api.coinbase.com
  - ACROSS_INTEGRATOR_ID
  - CCTP_API_URL
  - CCTP_TOKEN_MESSENGER_V2_ADDRESS
  - CCTP_MESSAGE_TRANSMITTER_V2_ADDRESS
  - CORS_DOMAIN
  - VELORA_PARTNER
  - LOKI_URL

services:
  pg-secret-generator:
    image: alpine:3.22.1
    container_name: router-pg-secret-generator
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /secrets
        if [ ! -f /secrets/app_user.txt ]; then
          printf '%s' 'router_app' > /secrets/app_user.txt
        fi
        if [ ! -f /secrets/app_password.txt ]; then
          apk add --no-cache openssl >/dev/null
          umask 077
          tmp="$$(mktemp /secrets/app_password.txt.XXXXXX)"
          openssl rand -hex 32 | tr -d '\n' > "$$tmp"
          chmod 600 "$$tmp"
          mv "$$tmp" /secrets/app_password.txt
          echo "Generated router app DB password"
        else
          echo "Router app DB password already exists"
        fi
    volumes:
      - router_postgres_secrets:/secrets
    restart: "no"
    networks:
      - router-network

  router-master-key-init:
    image: alpine:3.22.1
    container_name: router-master-key-init
    command:
      - /bin/sh
      - -ec
      - |
        key=/run/router-secrets/router-master-key.hex
        mkdir -p /run/router-secrets
        if [ -f "$$key" ]; then
          if ! grep -Eq '^[0-9a-fA-F]{128}$$' "$$key"; then
            echo "Existing router master key is malformed" >&2
            exit 1
          fi
          chmod 600 "$$key"
          echo "Router master key already exists"
          exit 0
        fi
        apk add --no-cache openssl >/dev/null
        umask 077
        tmp="$$(mktemp /run/router-secrets/router-master-key.hex.XXXXXX)"
        openssl rand -hex 64 | tr -d '\n' > "$$tmp"
        chmod 600 "$$tmp"
        mv "$$tmp" "$$key"
        echo "Generated router master key"
    volumes:
      - router_master_key:/run/router-secrets
    restart: "no"
    networks:
      - router-network

  postgres:
    image: postgres:18-alpine
    container_name: router-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_USER: router_app
      POSTGRES_PASSWORD_FILE: /run/postgres-secrets/app_password.txt
      POSTGRES_DB: router_db
      POSTGRES_INITDB_ARGS: "--data-checksums"
      REPLICA_USER: replicator
      REPLICA_PASSWORD: ${POSTGRES_REPLICA_PASSWORD:?set POSTGRES_REPLICA_PASSWORD}
    volumes:
      - router_postgres_data:/var/lib/postgresql
      - router_postgres_secrets:/run/postgres-secrets:ro
    configs:
      - source: postgres-conf
        target: /etc/postgresql/postgresql.conf
      - source: postgres-hba
        target: /etc/postgresql/pg_hba.conf
      - source: postgres-init
        target: /docker-entrypoint-initdb.d/00-router-init.sh
        mode: 0755
    command:
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      pg-secret-generator:
        condition: service_completed_successfully
    networks:
      - router-network
      - router-replication-network

  postgres-replication-gateway:
    image: alpine:3.22.1
    container_name: router-postgres-replication-gateway
    restart: unless-stopped
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache socat >/dev/null
        exec socat TCP-LISTEN:5432,fork,reuseaddr TCP:postgres:5432
    ports:
      - "5432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - router-replication-network

  router-api:
    image: ghcr.io/riftresearch/tee-router:0.1.9
    container_name: router-api
    restart: unless-stopped
    environment: *router-environment
    command:
      - /bin/sh
      - -ec
      - |
        DB_USER="$$(tr -d '\n\r' < /run/postgres-secrets/app_user.txt)"
        DB_PASS="$$(tr -d '\n\r' < /run/postgres-secrets/app_password.txt)"
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@postgres:5432/router_db"
        export METRICS_BIND_ADDR=0.0.0.0:9100
        exec /usr/local/bin/router-api --host 0.0.0.0 --port "$${ROUTER_API_PORT:-4522}"
    ports:
      - "4522:4522"
    expose:
      - "9100"
    volumes:
      - router_postgres_secrets:/run/postgres-secrets:ro
      - router_master_key:/run/router-secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      router-master-key-init:
        condition: service_completed_successfully
    networks:
      - router-network

  router-worker:
    image: ghcr.io/riftresearch/tee-router:0.1.9
    container_name: router-worker
    restart: unless-stopped
    environment: *router-environment
    command:
      - /bin/sh
      - -ec
      - |
        DB_USER="$$(tr -d '\n\r' < /run/postgres-secrets/app_user.txt)"
        DB_PASS="$$(tr -d '\n\r' < /run/postgres-secrets/app_password.txt)"
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@postgres:5432/router_db"
        export METRICS_BIND_ADDR=0.0.0.0:9101
        exec /usr/local/bin/router-worker
    expose:
      - "9101"
    volumes:
      - router_postgres_secrets:/run/postgres-secrets:ro
      - router_master_key:/run/router-secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      router-master-key-init:
        condition: service_completed_successfully
    networks:
      - router-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    container_name: router-otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    environment:
      - BETTERSTACK_SOURCE_TOKEN=${BETTERSTACK_SOURCE_TOKEN:?set BETTERSTACK_SOURCE_TOKEN}
      - DEPLOYMENT_ENVIRONMENT=${DEPLOYMENT_ENVIRONMENT:-alpha}
    configs:
      - source: otel-collector-config
        target: /etc/otelcol-contrib/config.yaml
    depends_on:
      - router-api
      - router-worker
    expose:
      - "4317"
      - "4318"
      - "13133"
    networks:
      - router-network

networks:
  router-network:
    name: router-v3-private-network
    ipam:
      config:
        - subnet: 172.30.0.0/16
  router-replication-network:
    name: router-v3-replication-network
    ipam:
      config:
        - subnet: 172.31.0.0/16

volumes:
  router_postgres_data:
  router_postgres_secrets:
  router_master_key:
