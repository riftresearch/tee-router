configs:
  postgres-conf:
    content: |
      # PostgreSQL primary config for the router Phala deployment.
      # Physical streaming replication carries schema and data to the Railway standby.
      # wal_level=logical is retained only so CDC consumers can decode router events from the standby.
      listen_addresses = '*'
      password_encryption = 'scram-sha-256'
      wal_level = logical
      max_wal_senders = 10
      max_replication_slots = 10
      hot_standby = on
      # Source-of-truth DB: synchronous_commit stays ON (durability). Only the
      # non-durability tuning from a391849 (buffers/cache/pool) is applied here;
      # the reconstructible-DB synchronous_commit=off profile is deliberately NOT.
      synchronous_commit = on
      shared_buffers = 1GB
      effective_cache_size = 4GB
      work_mem = 16MB
      maintenance_work_mem = 256MB
      checkpoint_timeout = 15min
      max_wal_size = 2GB
      random_page_cost = 1.1
      effective_io_concurrency = 200
      max_connections = 400
      log_connections = on
      log_disconnections = on
      log_statement = 'none'

  postgres-hba:
    content: |
      # TYPE  DATABASE      USER          ADDRESS       METHOD
      local   all           all                         scram-sha-256
      host    all           all           127.0.0.1/32  scram-sha-256
      host    all           all           ::1/128       scram-sha-256

      # Compose-network application traffic only.
      host    router_db     router_app    172.30.0.0/16 scram-sha-256

      # Physical replication traffic through the public replication proxy only.
      host    replication   replicator    172.31.0.0/16 scram-sha-256
      host    router_db     replicator    172.31.0.0/16 scram-sha-256

  postgres-init:
    content: |
      #!/bin/sh
      set -eu

      : "$${REPLICA_USER:?REPLICA_USER must be set}"
      : "$${REPLICA_PASSWORD:?REPLICA_PASSWORD must be set}"

      echo "Creating or updating physical replication role '$${REPLICA_USER}'"

      psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_DB" <<-SQL
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '$${REPLICA_USER}') THEN
            CREATE ROLE $${REPLICA_USER} LOGIN REPLICATION PASSWORD '$${REPLICA_PASSWORD}';
          ELSE
            ALTER ROLE $${REPLICA_USER} WITH LOGIN REPLICATION PASSWORD '$${REPLICA_PASSWORD}';
          END IF;
        END
        \$\$;

        -- Sauron + admin-dashboard read the standby as $${REPLICA_USER}; grant
        -- the read surface they need (SELECT on existing + future public tables,
        -- plus logical decoding so the CDC slot can be opened).
        GRANT USAGE ON SCHEMA public TO $${REPLICA_USER};
        GRANT SELECT ON ALL TABLES IN SCHEMA public TO $${REPLICA_USER};
        GRANT SELECT ON ALL SEQUENCES IN SCHEMA public TO $${REPLICA_USER};
        ALTER DEFAULT PRIVILEGES FOR ROLE $$POSTGRES_USER IN SCHEMA public
          GRANT SELECT ON TABLES TO $${REPLICA_USER};
        ALTER DEFAULT PRIVILEGES FOR ROLE $$POSTGRES_USER IN SCHEMA public
          GRANT SELECT ON SEQUENCES TO $${REPLICA_USER};
      SQL

      echo "Router Postgres init complete"

  temporal-dynamic-config:
    content: |
      limit.maxIDLength:
        - value: 255
          constraints: {}
      system.forceSearchAttributesCacheRefreshOnRead:
        - value: true
          constraints: {}

      # Throughput ceilings -- raise from defaults (frontend 2400 / matching 1200 / history 3000)
      frontend.rps:
        - value: 4800
          constraints: {}
      matching.rps:
        - value: 2400
          constraints: {}
      history.rps:
        - value: 6000
          constraints: {}

      # Persistence QPS ceilings -- raise from defaults (frontend 2000 / matching+history 9000)
      frontend.persistenceMaxQPS:
        - value: 4000
          constraints: {}
      matching.persistenceMaxQPS:
        - value: 18000
          constraints: {}
      history.persistenceMaxQPS:
        - value: 18000
          constraints: {}

      # Task queue partitions -- raise from default 4 to match poller concurrency (~64-128)
      matching.numTaskqueueReadPartitions:
        - value: 16
          constraints: {}
      matching.numTaskqueueWritePartitions:
        - value: 16
          constraints: {}

      # Host-level history cache (entries). Was history.cacheMaxSize pre-1.27.
      # Default is 128000; bumping to 256000 to reduce shard reload churn under sustained load.
      history.hostLevelCacheMaxSize:
        - value: 256000
          constraints: {}
      history.eventsCacheMaxSizeBytes:
        - value: 1073741824   # 1 GiB
          constraints: {}

  temporal-setup-postgres:
    content: |
      #!/bin/sh
      set -eu

      : "$${POSTGRES_SEEDS:?POSTGRES_SEEDS is required}"
      : "$${POSTGRES_USER:?POSTGRES_USER is required}"

      echo "Waiting for PostgreSQL port..."
      nc -z -w 10 "$${POSTGRES_SEEDS}" "$${DB_PORT:-5432}"
      echo "PostgreSQL port is available"

      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal create \
        || echo "Temporal database may already exist; continuing"
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal setup-schema -v 0.0 \
        || echo "Temporal schema may already be initialized; continuing"
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal update-schema -d /etc/temporal/schema/postgresql/v12/temporal/versioned

      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility create \
        || echo "Temporal visibility database may already exist; continuing"
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility setup-schema -v 0.0 \
        || echo "Temporal visibility schema may already be initialized; continuing"
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility update-schema -d /etc/temporal/schema/postgresql/v12/visibility/versioned

      echo "PostgreSQL schema setup complete"

  temporal-create-namespace:
    content: |
      #!/bin/sh
      set -eu

      namespace="$${DEFAULT_NAMESPACE:-default}"
      temporal_address="$${TEMPORAL_ADDRESS:-temporal:7233}"
      max_attempts="$${TEMPORAL_HEALTH_CHECK_MAX_ATTEMPTS:-30}"
      sleep_seconds="$${TEMPORAL_HEALTH_CHECK_SLEEP_SECONDS:-5}"
      server_host="$$(echo "$${temporal_address}" | cut -d: -f1)"
      server_port="$$(echo "$${temporal_address}" | cut -d: -f2)"

      echo "Waiting for Temporal server port..."
      attempt=1
      while ! nc -z -w 10 "$${server_host}" "$${server_port}"; do
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Temporal server port did not become available after $${max_attempts} attempts"
          exit 1
        fi
        echo "Temporal server port not ready yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

      echo "Waiting for Temporal server health..."
      attempt=1
      while ! temporal operator cluster health --address "$${temporal_address}"; do
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Temporal server did not become healthy after $${max_attempts} attempts"
          exit 1
        fi
        echo "Temporal server not healthy yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

      echo "Ensuring Temporal namespace '$${namespace}' exists..."
      attempt=1
      while :; do
        if temporal operator namespace describe --namespace "$${namespace}" --address "$${temporal_address}" >/dev/null 2>&1; then
          echo "Namespace '$${namespace}' already exists"
          break
        fi
        if temporal operator namespace create --namespace "$${namespace}" --address "$${temporal_address}" >/dev/null 2>&1; then
          echo "Namespace '$${namespace}' created"
          break
        fi
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Failed to create namespace '$${namespace}' after $${max_attempts} attempts"
          exit 1
        fi
        echo "Namespace operation not ready yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

  # In-TEE Alloy sidecar config. Source of truth: etc/alloy.phala.alloy —
  # kept inline here so compose.phala.yml stays self-contained (no repo
  # bind mounts). Keep the two in sync.
  phala-alloy-config:
    content: |
      logging {
        level  = "info"
        format = "logfmt"
      }

      otelcol.auth.bearer "egress" {
        token = sys.env("OBS_INGEST_TOKEN")
      }

      otelcol.exporter.otlphttp "egress" {
        client {
          endpoint = sys.env("ALLOY_V3_OTLP_URL")
          auth     = otelcol.auth.bearer.egress.handler
        }
      }

      otelcol.processor.batch "egress" {
        output {
          metrics = [otelcol.exporter.otlphttp.egress.input]
          logs    = [otelcol.exporter.otlphttp.egress.input]
        }
      }

      prometheus.scrape "phala_core" {
        targets = [
          {"__address__" = "router-api:9100", "job" = "router-api"},
          {"__address__" = "router-worker:9101", "job" = "router-worker"},
          {"__address__" = "temporal-worker:9103", "job" = "temporal-worker"},
          {"__address__" = "temporal:9090", "job" = "temporal-frontend"},
          {"__address__" = "temporal-history:9090", "job" = "temporal-history"},
          {"__address__" = "temporal-matching:9090", "job" = "temporal-matching"},
          {"__address__" = "temporal-internal-worker:9090", "job" = "temporal-internal-worker"},
        ]
        scrape_interval = "15s"
        scrape_timeout  = "10s"
        forward_to      = [otelcol.receiver.prometheus.phala_core.receiver]
      }

      otelcol.receiver.prometheus "phala_core" {
        output {
          metrics = [otelcol.processor.batch.egress.input]
        }
      }

      otelcol.receiver.otlp "phala_logs" {
        http {
          endpoint = "0.0.0.0:4318"
        }
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        output {
          logs = [otelcol.processor.batch.egress.input]
        }
      }

  # Caddy reverse proxy that fronts the internal Temporal Web UI with HTTP
  # basic auth. The bcrypt password hash is injected via the
  # TEMPORAL_UI_PW_HASH env var (see .secrets/phala.env) and substituted by
  # Caddy at load time, so no credential material lives in this file.
  temporal-ui-caddyfile:
    content: |
      :8080 {
        basic_auth {
          admin {$$TEMPORAL_UI_PW_HASH}
        }
        reverse_proxy temporal-ui:8080
      }

