configs:
  stunnel-conf:
    content: |
      foreground = yes
      debug = 5

      [phala-router-postgres]
      client = yes
      accept = 0.0.0.0:5432
      connect = $${PHALA_DB_SNI}:443
      sni = $${PHALA_DB_SNI}
      verifyChain = no

services:
  stunnel-v3:
    image: debian:bookworm-slim
    container_name: router-v3-stunnel
    environment:
      PHALA_DB_SNI: ${PHALA_DB_SNI:?set PHALA_DB_SNI}
    command:
      - /bin/bash
      - -ec
      - |
        apt-get update -qq
        apt-get install -y -qq stunnel4 gettext-base netcat-openbsd
        envsubst < /etc/stunnel/stunnel.conf.template > /etc/stunnel/stunnel.conf
        exec stunnel /etc/stunnel/stunnel.conf
    configs:
      - source: stunnel-conf
        target: /etc/stunnel/stunnel.conf.template
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - router-physical-replica-network

  router-physical-standby-v3:
    build:
      context: ../railway/router-physical-standby
      dockerfile: Dockerfile
    container_name: router-physical-standby-v3
    restart: unless-stopped
    depends_on:
      stunnel-v3:
        condition: service_healthy
    environment:
      PRIMARY_DB_HOST: stunnel-v3
      PRIMARY_DB_PORT: ${PRIMARY_DB_PORT:-5432}
      PRIMARY_DB_NAME: ${PRIMARY_DB_NAME:-router_db}
      PRIMARY_DB_USER: ${PRIMARY_DB_USER:-replicator}
      PRIMARY_DB_PASSWORD: ${PRIMARY_DB_PASSWORD:?set PRIMARY_DB_PASSWORD}
      PRIMARY_DB_SSLMODE: ${PRIMARY_DB_SSLMODE:-prefer}
      PRIMARY_REPLICATION_SLOT: ${PRIMARY_REPLICATION_SLOT:-router_physical_standby_v3}
      STANDBY_APPLICATION_NAME: ${STANDBY_APPLICATION_NAME:-router-physical-standby-v3}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "${PHYSICAL_STANDBY_PUBLIC_PORT:-5434}:5432"
    volumes:
      - router_physical_standby_v3_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRIMARY_DB_USER:-replicator} -d ${PRIMARY_DB_NAME:-router_db} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - router-physical-replica-network

  sauron-state-db-v3:
    image: postgres:18-alpine
    container_name: sauron-state-db-v3
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SAURON_STATE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${SAURON_STATE_DB_PASSWORD:?set SAURON_STATE_DB_PASSWORD}
      POSTGRES_DB: ${SAURON_STATE_DB_NAME:-sauron_state}
    ports:
      - "${SAURON_STATE_DB_PUBLIC_PORT:-5435}:5432"
    volumes:
      - sauron_state_db_v3_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - router-physical-replica-network

networks:
  router-physical-replica-network:

volumes:
  router_physical_standby_v3_data:
  sauron_state_db_v3_data:
