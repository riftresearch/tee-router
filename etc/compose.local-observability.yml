services:
  router-api:
    environment:
      DEPLOYMENT_ENVIRONMENT: local
      METRICS_BIND_ADDR: 0.0.0.0:9100
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
    ports:
      - "9100:9100"

  router-worker:
    environment:
      DEPLOYMENT_ENVIRONMENT: local
      METRICS_BIND_ADDR: 0.0.0.0:9101
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      ROUTER_WORKER_ORDER_EXECUTION_POLL_SECONDS: "1"
      ROUTER_WORKER_ORDER_MAINTENANCE_PASS_LIMIT: "1000"
      ROUTER_WORKER_ORDER_PLANNING_PASS_LIMIT: "1000"
      ROUTER_WORKER_ORDER_EXECUTION_PASS_LIMIT: "1000"
      ROUTER_WORKER_ORDER_EXECUTION_CONCURRENCY: "64"
      ROUTER_WORKER_VAULT_FUNDING_HINT_PASS_LIMIT: "1000"
    ports:
      - "9101:9101"

  sauron:
    environment:
      DEPLOYMENT_ENVIRONMENT: local
      METRICS_BIND_ADDR: 0.0.0.0:9102
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      SAURON_EVM_INDEXED_LOOKUP_CONCURRENCY: "64"
      SAURON_BITCOIN_INDEXED_LOOKUP_CONCURRENCY: "64"
    ports:
      - "9102:9102"

  alloy:
    image: grafana/alloy:latest
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    depends_on:
      - victoriametrics
      - loki
      - tempo
    volumes:
      - ./alloy.local.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    command:
      - -storageDataPath=/victoria-metrics-data
      - -retentionPeriod=30d
      - -httpListenAddr=:8428
    volumes:
      - router_local_victoriametrics:/victoria-metrics-data
    ports:
      - "8428:8428"

  loki:
    image: grafana/loki:latest
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki.local.yml:/etc/loki/local-config.yaml:ro
      - router_local_loki:/loki
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.9.0
    command:
      - -config.file=/etc/tempo/local-config.yaml
    volumes:
      - ./tempo.local.yml:/etc/tempo/local-config.yaml:ro
      - router_local_tempo:/var/tempo
    ports:
      - "3200:3200"
      - "4319:4317"
      - "4320:4318"

  grafana:
    image: grafana/grafana:10.4.2
    depends_on:
      - router-api
      - router-worker
      - temporal
      - sauron
      - alloy
      - victoriametrics
      - loki
      - tempo
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_FEATURE_TOGGLES_DISABLE: dashboardScene,dashboardSceneForViewers
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/router-overview.json
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - router_local_grafana:/var/lib/grafana
    ports:
      - "3002:3000"

volumes:
  router_local_grafana:
  router_local_loki:
  router_local_tempo:
  router_local_victoriametrics:
