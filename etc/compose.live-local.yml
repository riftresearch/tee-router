# Real-network overlay for compose.local-infra.yml.
#
# This stack uses real external networks and real funds. Use a dedicated
# .env.live-local copied from etc/env.live-local.example. Never reuse production
# custody/admin keys here.

x-live-host-gateway: &live-host-gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-live-token-indexer-db-command: &live-token-indexer-db-command
  - postgres
  - -c
  - max_connections=200
  - -c
  - shared_buffers=512MB
  - -c
  - effective_cache_size=2GB
  - -c
  - work_mem=8MB
  - -c
  - maintenance_work_mem=128MB
  - -c
  - max_wal_size=1GB
  - -c
  - checkpoint_completion_target=0.9
  - -c
  - random_page_cost=1.1
  - -c
  - effective_io_concurrency=200
  - -c
  - synchronous_commit=off

x-live-token-indexer-command: &live-token-indexer-command
  - sh
  - -c
  - |
    set -eu
    PONDER_CONTRACT_START_BLOCK="$$(node --input-type=module -e '
    const rpcUrl = process.env.PONDER_RPC_URL_HTTP;
    if (!rpcUrl) {
      throw new Error("PONDER_RPC_URL_HTTP is required");
    }
    const response = await fetch(rpcUrl, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ jsonrpc: "2.0", id: 1, method: "eth_blockNumber", params: [] }),
    });
    if (!response.ok) {
      throw new Error("eth_blockNumber HTTP " + response.status);
    }
    const body = await response.json();
    if (body.error) {
      throw new Error("eth_blockNumber RPC error: " + JSON.stringify(body.error));
    }
    if (typeof body.result !== "string" || !/^0x[0-9a-fA-F]+$/.test(body.result)) {
      throw new Error("eth_blockNumber returned invalid result: " + JSON.stringify(body.result));
    }
    console.log(BigInt(body.result).toString());
    ')"
    export PONDER_CONTRACT_START_BLOCK
    echo "resolved PONDER_CONTRACT_START_BLOCK=$$PONDER_CONTRACT_START_BLOCK for chain $$PONDER_CHAIN_ID"
    exec pnpm start --port "$$PORT"

x-live-token-indexer-service: &live-token-indexer-service
  build:
    context: ..
    dockerfile: evm-token-indexer/Dockerfile.index
  restart: on-failure
  command: *live-token-indexer-command
  <<: *live-host-gateway
  environment: &live-token-indexer-env
    NODE_ENV: production
    PORT: "4001"
    PONDER_PORT: "4001"
    PONDER_LOG_LEVEL: ${EVM_TOKEN_INDEXER_PONDER_LOG_LEVEL:-info}
    PONDER_DISABLE_CACHE: ${EVM_TOKEN_INDEXER_DISABLE_CACHE:-false}
    EVM_TOKEN_INDEXER_API_KEY: ${TOKEN_INDEXER_API_KEY:?TOKEN_INDEXER_API_KEY is required}
    EVM_TOKEN_INDEXER_RAW_RETENTION_SECONDS: ${EVM_TOKEN_INDEXER_RAW_RETENTION_SECONDS:-604800}
    EVM_TOKEN_INDEXER_REORG_SAFE_BLOCKS: ${EVM_TOKEN_INDEXER_REORG_SAFE_BLOCKS:-64}
    EVM_TOKEN_INDEXER_WS_MAX_BUFFERED_BYTES: ${EVM_TOKEN_INDEXER_WS_MAX_BUFFERED_BYTES:-8388608}
  expose:
    - "4001"

services:
  router-master-key-init:
    environment:
      ROUTER_LOCAL_MASTER_KEY_HEX: ${ROUTER_LIVE_LOCAL_MASTER_KEY_HEX:?ROUTER_LIVE_LOCAL_MASTER_KEY_HEX is required for real-funds custody derivation}

  router-api:
    <<: *live-host-gateway
    environment: &live_router_env
      DEPLOYMENT_ENVIRONMENT: live-local
      PRODUCTION: ${PRODUCTION:-false}
      TEE_ROUTER_LIVE_LOCAL_ACK: ${TEE_ROUTER_LIVE_LOCAL_ACK:?set TEE_ROUTER_LIVE_LOCAL_ACK=I_UNDERSTAND_THIS_USES_REAL_FUNDS}
      ETH_RPC_URL: ${ETH_RPC_URL:?ETH_RPC_URL is required}
      BASE_RPC_URL: ${BASE_RPC_URL:?BASE_RPC_URL is required}
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL:?ARBITRUM_RPC_URL is required}
      # Public Flashbots Protect endpoint; not a secret, hardcoded like the Phala stack.
      FLASHBOTS_RPC_URL: https://rpc.flashbots.net/fast
      BITCOIN_RPC_URL: ${BITCOIN_RPC_URL:?BITCOIN_RPC_URL is required}
      BITCOIN_RPC_AUTH: ${BITCOIN_RPC_AUTH:?BITCOIN_RPC_AUTH is required}
      ESPLORA_HTTP_SERVER_URL: ${ESPLORA_HTTP_SERVER_URL:?ESPLORA_HTTP_SERVER_URL is required}
      BITCOIN_NETWORK: ${BITCOIN_NETWORK:-bitcoin}
      ETHEREUM_PAYMASTER_PRIVATE_KEY: ${ETHEREUM_PAYMASTER_PRIVATE_KEY:?ETHEREUM_PAYMASTER_PRIVATE_KEY is required}
      BASE_PAYMASTER_PRIVATE_KEY: ${BASE_PAYMASTER_PRIVATE_KEY:?BASE_PAYMASTER_PRIVATE_KEY is required}
      ARBITRUM_PAYMASTER_PRIVATE_KEY: ${ARBITRUM_PAYMASTER_PRIVATE_KEY:?ARBITRUM_PAYMASTER_PRIVATE_KEY is required}
      HYPERLIQUID_PAYMASTER_PRIVATE_KEY: ${HYPERLIQUID_PAYMASTER_PRIVATE_KEY:?HYPERLIQUID_PAYMASTER_PRIVATE_KEY is required}
      ROUTER_DETECTOR_API_KEY: ${ROUTER_DETECTOR_API_KEY:?ROUTER_DETECTOR_API_KEY is required}
      ROUTER_GATEWAY_API_KEY: ${ROUTER_GATEWAY_API_KEY:?ROUTER_GATEWAY_API_KEY is required}
      ROUTER_ADMIN_API_KEY: ${ROUTER_ADMIN_API_KEY:?ROUTER_ADMIN_API_KEY is required}
      ROUTER_ORDERS_DISABLED: ${ROUTER_ORDERS_DISABLED:-false}
      ROUTER_MARKET_ORDER_QUOTE_TIMEOUT_MS: ${ROUTER_MARKET_ORDER_QUOTE_TIMEOUT_MS:-60000}
      ROUTER_SINGLE_HOP_QUOTE_TIMEOUT_MS: ${ROUTER_SINGLE_HOP_QUOTE_TIMEOUT_MS:-5000}
      ACROSS_API_URL: ${ACROSS_API_URL:-https://app.across.to/api}
      ACROSS_API_KEY: ${ACROSS_API_KEY:-}
      ACROSS_INTEGRATOR_ID: ${ACROSS_INTEGRATOR_ID:-rift-live-local}
      CCTP_API_URL: ${CCTP_API_URL:-https://iris-api.circle.com}
      CCTP_TOKEN_MESSENGER_V2_ADDRESS: ${CCTP_TOKEN_MESSENGER_V2_ADDRESS:?CCTP_TOKEN_MESSENGER_V2_ADDRESS is required}
      CCTP_MESSAGE_TRANSMITTER_V2_ADDRESS: ${CCTP_MESSAGE_TRANSMITTER_V2_ADDRESS:?CCTP_MESSAGE_TRANSMITTER_V2_ADDRESS is required}
      CCTP_TRANSFER_MODE: ${CCTP_TRANSFER_MODE:-standard}
      HYPERUNIT_API_URL: ${HYPERUNIT_API_URL:?HYPERUNIT_API_URL is required}
      HYPERUNIT_PROXY_URL: ${HYPERUNIT_PROXY_URL:?HYPERUNIT_PROXY_URL is required}
      UPSTREAM_PROXY_URL: ${UPSTREAM_PROXY_URL:?UPSTREAM_PROXY_URL is required}
      ETH_RPC_PROXY_URL: ${ETH_RPC_PROXY_URL:-}
      BASE_RPC_PROXY_URL: ${BASE_RPC_PROXY_URL:-}
      ARBITRUM_RPC_PROXY_URL: ${ARBITRUM_RPC_PROXY_URL:-}
      BITCOIN_RPC_PROXY_URL: ${BITCOIN_RPC_PROXY_URL:-}
      ESPLORA_PROXY_URL: ${ESPLORA_PROXY_URL:-}
      ACROSS_PROXY_URL: ${ACROSS_PROXY_URL:-}
      CCTP_PROXY_URL: ${CCTP_PROXY_URL:-}
      HYPERLIQUID_PROXY_URL: ${HYPERLIQUID_PROXY_URL:-}
      VELORA_PROXY_URL: ${VELORA_PROXY_URL:-}
      RELAY_PROXY_URL: ${RELAY_PROXY_URL:-}
      NEAR_INTENTS_PROXY_URL: ${NEAR_INTENTS_PROXY_URL:-}
      MAYAN_PROXY_URL: ${MAYAN_PROXY_URL:-}
      CHAINFLIP_PROXY_URL: ${CHAINFLIP_PROXY_URL:-}
      GARDEN_PROXY_URL: ${GARDEN_PROXY_URL:-}
      CHAINALYSIS_PROXY_URL: ${CHAINALYSIS_PROXY_URL:-}
      COINBASE_PROXY_URL: ${COINBASE_PROXY_URL:-}
      HYPERLIQUID_API_URL: ${HYPERLIQUID_API_URL:-https://api.hyperliquid.xyz}
      HYPERLIQUID_NETWORK: ${HYPERLIQUID_NETWORK:-mainnet}
      VELORA_API_URL: ${VELORA_API_URL:-https://api.velora.xyz}
      RELAY_API_URL: ${RELAY_API_URL:-}
      RELAY_API_KEY: ${RELAY_API_KEY:-}
      NEAR_INTENTS_API_URL: ${NEAR_INTENTS_API_URL:-}
      NEAR_INTENTS_API_KEY: ${NEAR_INTENTS_API_KEY:-}
      NEAR_INTENTS_BEARER_TOKEN: ${NEAR_INTENTS_BEARER_TOKEN:-}
      MAYAN_API_URL: ${MAYAN_API_URL:-}
      MAYAN_API_KEY: ${MAYAN_API_KEY:-}
      CHAINFLIP_API_URL: ${CHAINFLIP_API_URL:-}
      GARDEN_API_URL: ${GARDEN_API_URL:-}
      GARDEN_API_KEY: ${GARDEN_API_KEY:-}
      COINBASE_PRICE_API_BASE_URL: ${COINBASE_PRICE_API_BASE_URL:-https://api.coinbase.com}

  router-worker:
    <<: *live-host-gateway
    environment:
      <<: *live_router_env
      ROUTER_WORKER_ID: live-local-router-worker

  temporal-worker:
    <<: *live-host-gateway
    environment:
      <<: *live_router_env

  sauron:
    <<: *live-host-gateway
    depends_on:
      evm-token-indexer-ethereum:
        condition: service_healthy
      evm-token-indexer-base:
        condition: service_healthy
      evm-token-indexer-arbitrum:
        condition: service_healthy
    environment:
      DEPLOYMENT_ENVIRONMENT: live-local
      TEE_ROUTER_LIVE_LOCAL_ACK: ${TEE_ROUTER_LIVE_LOCAL_ACK:?set TEE_ROUTER_LIVE_LOCAL_ACK=I_UNDERSTAND_THIS_USES_REAL_FUNDS}
      ROUTER_DETECTOR_API_KEY: ${ROUTER_DETECTOR_API_KEY:?ROUTER_DETECTOR_API_KEY is required}
      ESPLORA_HTTP_SERVER_URL: ${ESPLORA_HTTP_SERVER_URL:?ESPLORA_HTTP_SERVER_URL is required}
      BITCOIN_RPC_URL: ${BITCOIN_RPC_URL:?BITCOIN_RPC_URL is required}
      BITCOIN_RPC_AUTH: ${BITCOIN_RPC_AUTH:?BITCOIN_RPC_AUTH is required}
      BITCOIN_ZMQ_RAWBLOCK_ENDPOINT: ${BITCOIN_ZMQ_RAWBLOCK_ENDPOINT:?BITCOIN_ZMQ_RAWBLOCK_ENDPOINT is required}
      BITCOIN_ZMQ_RAWTX_ENDPOINT: ${BITCOIN_ZMQ_RAWTX_ENDPOINT:?BITCOIN_ZMQ_RAWTX_ENDPOINT is required}
      BITCOIN_ZMQ_SEQUENCE_ENDPOINT: ${BITCOIN_ZMQ_SEQUENCE_ENDPOINT:-}
      ETH_RPC_URL: ${ETH_RPC_URL:?ETH_RPC_URL is required}
      BASE_RPC_URL: ${BASE_RPC_URL:?BASE_RPC_URL is required}
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL:?ARBITRUM_RPC_URL is required}
      ETHEREUM_TOKEN_INDEXER_URL: http://evm-token-indexer-ethereum:4001
      BASE_TOKEN_INDEXER_URL: http://evm-token-indexer-base:4001
      ARBITRUM_TOKEN_INDEXER_URL: http://evm-token-indexer-arbitrum:4001
      ETHEREUM_RECEIPT_WATCHER_URL: http://evm-receipt-watcher-ethereum:8080
      BASE_RECEIPT_WATCHER_URL: http://evm-receipt-watcher-base:8080
      ARBITRUM_RECEIPT_WATCHER_URL: http://evm-receipt-watcher-arbitrum:8080
      BITCOIN_INDEXER_URL: ${BITCOIN_INDEXER_URL:-http://bitcoin-indexer:8080}
      BITCOIN_RECEIPT_WATCHER_URL: ${BITCOIN_RECEIPT_WATCHER_URL:-http://bitcoin-receipt-watcher:8080}
      TOKEN_INDEXER_API_KEY: ${TOKEN_INDEXER_API_KEY:?TOKEN_INDEXER_API_KEY is required}
      HL_SHIM_INDEXER_URL: http://hl-shim-indexer:8080
      HYPERUNIT_API_URL: ${HYPERUNIT_API_URL:?HYPERUNIT_API_URL is required}

  hl-shim-indexer:
    <<: *live-host-gateway
    environment:
      DEPLOYMENT_ENVIRONMENT: live-local
      HL_SHIM_INFO_URL: ${HYPERLIQUID_API_URL:-https://api.hyperliquid.xyz}
      HL_SHIM_WEIGHT_BUDGET_PER_MIN: ${HL_SHIM_WEIGHT_BUDGET_PER_MIN:-900}
      HL_SHIM_WORKER_COUNT: ${HL_SHIM_WORKER_COUNT:-16}
      HL_SHIM_MAX_DB_CONNECTIONS: ${HL_SHIM_MAX_DB_CONNECTIONS:-50}

  evm-receipt-watcher-ethereum:
    <<: *live-host-gateway
    environment:
      DEPLOYMENT_ENVIRONMENT: live-local
      EVM_RECEIPT_WATCHER_HTTP_RPC_URL: ${ETH_RPC_URL:?ETH_RPC_URL is required}
      EVM_RECEIPT_WATCHER_WS_RPC_URL: ${ETH_WS_RPC_URL:?ETH_WS_RPC_URL is required}
      EVM_RECEIPT_WATCHER_POLL_INTERVAL_MS: ${EVM_RECEIPT_WATCHER_POLL_INTERVAL_MS:-2000}

  evm-receipt-watcher-base:
    <<: *live-host-gateway
    environment:
      DEPLOYMENT_ENVIRONMENT: live-local
      EVM_RECEIPT_WATCHER_HTTP_RPC_URL: ${BASE_RPC_URL:?BASE_RPC_URL is required}
      EVM_RECEIPT_WATCHER_WS_RPC_URL: ${BASE_WS_RPC_URL:?BASE_WS_RPC_URL is required}
      EVM_RECEIPT_WATCHER_POLL_INTERVAL_MS: ${EVM_RECEIPT_WATCHER_POLL_INTERVAL_MS:-2000}

  evm-receipt-watcher-arbitrum:
    <<: *live-host-gateway
    environment:
      DEPLOYMENT_ENVIRONMENT: live-local
      EVM_RECEIPT_WATCHER_HTTP_RPC_URL: ${ARBITRUM_RPC_URL:?ARBITRUM_RPC_URL is required}
      EVM_RECEIPT_WATCHER_WS_RPC_URL: ${ARBITRUM_WS_RPC_URL:?ARBITRUM_WS_RPC_URL is required}
      EVM_RECEIPT_WATCHER_POLL_INTERVAL_MS: ${EVM_RECEIPT_WATCHER_POLL_INTERVAL_MS:-2000}

  bitcoin-indexer:
    <<: *live-host-gateway
    environment:
      DEPLOYMENT_ENVIRONMENT: live-local
      BITCOIN_INDEXER_NETWORK: ${BITCOIN_NETWORK:-bitcoin}
      BITCOIN_INDEXER_RPC_URL: ${BITCOIN_RPC_URL:?BITCOIN_RPC_URL is required}
      BITCOIN_INDEXER_RPC_AUTH: ${BITCOIN_RPC_AUTH:?BITCOIN_RPC_AUTH is required}
      BITCOIN_INDEXER_ESPLORA_URL: ${ESPLORA_HTTP_SERVER_URL:?ESPLORA_HTTP_SERVER_URL is required}
      BITCOIN_INDEXER_ZMQ_RAWBLOCK_ENDPOINT: ${BITCOIN_ZMQ_RAWBLOCK_ENDPOINT:?BITCOIN_ZMQ_RAWBLOCK_ENDPOINT is required}
      BITCOIN_INDEXER_ZMQ_RAWTX_ENDPOINT: ${BITCOIN_ZMQ_RAWTX_ENDPOINT:?BITCOIN_ZMQ_RAWTX_ENDPOINT is required}
      BITCOIN_INDEXER_POLL_INTERVAL_MS: ${BITCOIN_INDEXER_POLL_INTERVAL_MS:-2000}

  bitcoin-receipt-watcher:
    <<: *live-host-gateway
    environment:
      DEPLOYMENT_ENVIRONMENT: live-local
      BITCOIN_RECEIPT_WATCHER_CHAIN: bitcoin
      BITCOIN_RECEIPT_WATCHER_RPC_URL: ${BITCOIN_RPC_URL:?BITCOIN_RPC_URL is required}
      BITCOIN_RECEIPT_WATCHER_RPC_AUTH: ${BITCOIN_RPC_AUTH:?BITCOIN_RPC_AUTH is required}
      BITCOIN_RECEIPT_WATCHER_ZMQ_RAWBLOCK_ENDPOINT: ${BITCOIN_ZMQ_RAWBLOCK_ENDPOINT:?BITCOIN_ZMQ_RAWBLOCK_ENDPOINT is required}
      BITCOIN_RECEIPT_WATCHER_POLL_INTERVAL_MS: ${BITCOIN_RECEIPT_WATCHER_POLL_INTERVAL_MS:-2000}

  router-gateway:
    <<: *live-host-gateway
    environment:
      DEPLOYMENT_ENVIRONMENT: live-local
      ROUTER_GATEWAY_API_KEY: ${ROUTER_GATEWAY_API_KEY:?ROUTER_GATEWAY_API_KEY is required}
      ROUTER_GATEWAY_CANCELLATION_SECRET_KEY: ${ROUTER_GATEWAY_CANCELLATION_SECRET_KEY:?ROUTER_GATEWAY_CANCELLATION_SECRET_KEY is required}
      ROUTER_GATEWAY_BITCOIN_ADDRESS_NETWORKS: ${ROUTER_GATEWAY_BITCOIN_ADDRESS_NETWORKS:-mainnet}
      # Real-network RPCs — used to read ERC-20 decimals() for address-form tokens.
      ETH_RPC_URL: ${ETH_RPC_URL:?ETH_RPC_URL is required}
      BASE_RPC_URL: ${BASE_RPC_URL:?BASE_RPC_URL is required}
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL:?ARBITRUM_RPC_URL is required}

  admin-dashboard:
    <<: *live-host-gateway
    environment:
      DEPLOYMENT_ENVIRONMENT: live-local
      ROUTER_ADMIN_API_KEY: ${ROUTER_ADMIN_API_KEY:?ROUTER_ADMIN_API_KEY is required}

  evm-token-indexer-ethereum-db:
    image: postgres:16-alpine
    command: *live-token-indexer-db-command
    environment:
      POSTGRES_USER: ponder
      POSTGRES_PASSWORD: ponder
      POSTGRES_DB: ponder
    volumes:
      - router_live_local_token_indexer_ethereum_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponder -d ponder"]
      interval: 5s
      timeout: 5s
      retries: 20

  evm-token-indexer-base-db:
    image: postgres:16-alpine
    command: *live-token-indexer-db-command
    environment:
      POSTGRES_USER: ponder
      POSTGRES_PASSWORD: ponder
      POSTGRES_DB: ponder
    volumes:
      - router_live_local_token_indexer_base_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponder -d ponder"]
      interval: 5s
      timeout: 5s
      retries: 20

  evm-token-indexer-arbitrum-db:
    image: postgres:16-alpine
    command: *live-token-indexer-db-command
    environment:
      POSTGRES_USER: ponder
      POSTGRES_PASSWORD: ponder
      POSTGRES_DB: ponder
    volumes:
      - router_live_local_token_indexer_arbitrum_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponder -d ponder"]
      interval: 5s
      timeout: 5s
      retries: 20


  evm-token-indexer-ethereum:
    <<: *live-token-indexer-service
    depends_on:
      evm-token-indexer-ethereum-db:
        condition: service_healthy
    environment:
      <<: *live-token-indexer-env
      PONDER_CHAIN_ID: "1"
      PONDER_RPC_URL_HTTP: ${ETH_RPC_URL:?ETH_RPC_URL is required}
      PONDER_WS_URL_HTTP: ${ETH_WS_RPC_URL:?ETH_WS_RPC_URL is required}
      DATABASE_URL: postgres://ponder:ponder@evm-token-indexer-ethereum-db:5432/ponder
      DATABASE_SCHEMA: tokens_ethereum
      PONDER_SCHEMA: tokens_ethereum
    ports:
      - "4001:4001"

  evm-token-indexer-base:
    <<: *live-token-indexer-service
    depends_on:
      evm-token-indexer-base-db:
        condition: service_healthy
    environment:
      <<: *live-token-indexer-env
      PONDER_CHAIN_ID: "8453"
      PONDER_RPC_URL_HTTP: ${BASE_RPC_URL:?BASE_RPC_URL is required}
      PONDER_WS_URL_HTTP: ${BASE_WS_RPC_URL:?BASE_WS_RPC_URL is required}
      DATABASE_URL: postgres://ponder:ponder@evm-token-indexer-base-db:5432/ponder
      DATABASE_SCHEMA: tokens_base
      PONDER_SCHEMA: tokens_base
    ports:
      - "4002:4001"

  evm-token-indexer-arbitrum:
    <<: *live-token-indexer-service
    depends_on:
      evm-token-indexer-arbitrum-db:
        condition: service_healthy
    environment:
      <<: *live-token-indexer-env
      PONDER_CHAIN_ID: "42161"
      PONDER_RPC_URL_HTTP: ${ARBITRUM_RPC_URL:?ARBITRUM_RPC_URL is required}
      PONDER_WS_URL_HTTP: ${ARBITRUM_WS_RPC_URL:?ARBITRUM_WS_RPC_URL is required}
      DATABASE_URL: postgres://ponder:ponder@evm-token-indexer-arbitrum-db:5432/ponder
      DATABASE_SCHEMA: tokens_arbitrum
      PONDER_SCHEMA: tokens_arbitrum
    ports:
      - "4003:4001"


volumes:
  router_live_local_token_indexer_ethereum_db:
  router_live_local_token_indexer_base_db:
  router_live_local_token_indexer_arbitrum_db:
