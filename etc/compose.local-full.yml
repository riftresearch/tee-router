configs:
  router-postgres-init:
    content: |
      #!/bin/sh
      set -eu

      psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_DB" <<-SQL
        CREATE ROLE replicator LOGIN REPLICATION PASSWORD 'replicator';
        CREATE PUBLICATION router_all_tables FOR ALL TABLES;

        GRANT USAGE ON SCHEMA public TO replicator;
        GRANT SELECT ON ALL TABLES IN SCHEMA public TO replicator;
        GRANT USAGE ON ALL SEQUENCES IN SCHEMA public TO replicator;
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO replicator;
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE ON SEQUENCES TO replicator;
      SQL

  local-replica-setup:
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      PRIMARY_CONN="postgresql://replicator:replicator@router-postgres:5432/router_db?sslmode=disable"
      PRIMARY_ADMIN_CONN="postgresql://router_app:router_app@router-postgres:5432/router_db?sslmode=disable"
      REPLICA_ADMIN_CONN="postgresql://postgres:postgres@router-postgres-replica:5432/postgres?sslmode=disable"
      REPLICA_DB_CONN="postgresql://postgres:postgres@router-postgres-replica:5432/router_db?sslmode=disable"

      until psql "$${PRIMARY_CONN}" -c '\q' 2>/dev/null; do
        echo "waiting for local router primary"
        sleep 2
      done

      until psql "$${REPLICA_ADMIN_CONN}" -c '\q' 2>/dev/null; do
        echo "waiting for local router replica"
        sleep 2
      done

      REPLICA_DB_EXISTS=$$(psql "$${REPLICA_ADMIN_CONN}" -tAc "SELECT COUNT(*) FROM pg_database WHERE datname = 'router_db';")
      if [ "$${REPLICA_DB_EXISTS}" -eq "1" ]; then
        SUB_EXISTS=$$(psql "$${REPLICA_DB_CONN}" -tAc "SELECT COUNT(*) FROM pg_subscription WHERE subname = 'router_local_subscription';")
        if [ "$${SUB_EXISTS}" -eq "1" ]; then
          psql -v ON_ERROR_STOP=1 "$${REPLICA_DB_CONN}" \
            -c "ALTER SUBSCRIPTION router_local_subscription DISABLE;" \
            -c "ALTER SUBSCRIPTION router_local_subscription SET (slot_name = NONE);" \
            -c "DROP SUBSCRIPTION router_local_subscription;"
        fi
      fi

      for attempt in $$(seq 1 20); do
        psql -v ON_ERROR_STOP=1 "$${REPLICA_ADMIN_CONN}" \
          -c "SELECT pg_terminate_backend(active_pid) FROM pg_catalog.pg_replication_slots WHERE database = 'router_db' AND active_pid IS NOT NULL;" \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_catalog.pg_replication_slots WHERE database = 'router_db' AND active_pid IS NULL;"

        REMAINING_SLOTS=$$(psql "$${REPLICA_ADMIN_CONN}" -tAc "SELECT COUNT(*) FROM pg_catalog.pg_replication_slots WHERE database = 'router_db';")
        if [ "$${REMAINING_SLOTS}" -eq "0" ]; then
          break
        fi
        if [ "$${attempt}" -eq "20" ]; then
          echo "timed out waiting for local replica replication slots to close" >&2
          exit 3
        fi
        sleep 0.2
      done

      psql -v ON_ERROR_STOP=1 "$${REPLICA_ADMIN_CONN}" \
        -c "DROP DATABASE IF EXISTS router_db WITH (FORCE);" \
        -c "CREATE DATABASE router_db;"

      psql "$${PRIMARY_ADMIN_CONN}" -c "SELECT pg_terminate_backend(active_pid) FROM pg_catalog.pg_replication_slots WHERE slot_name = 'router_local_subscription' AND active_pid IS NOT NULL;"
      SLOT_EXISTS=$$(psql "$${PRIMARY_ADMIN_CONN}" -tAc "SELECT COUNT(*) FROM pg_replication_slots WHERE slot_name = 'router_local_subscription';")
      if [ "$${SLOT_EXISTS}" -eq "1" ]; then
        psql "$${PRIMARY_ADMIN_CONN}" -c "SELECT pg_drop_replication_slot('router_local_subscription');"
      fi

      pg_dump "$${PRIMARY_CONN}" --schema-only --no-owner --no-privileges --no-publications --no-subscriptions | \
        psql "$${REPLICA_DB_CONN}"

      psql "$${REPLICA_DB_CONN}" -c "CREATE PUBLICATION router_cdc_publication;"

      psql "$${REPLICA_DB_CONN}" -c "CREATE SUBSCRIPTION router_local_subscription CONNECTION 'host=router-postgres port=5432 dbname=router_db user=replicator password=replicator sslmode=disable' PUBLICATION router_all_tables WITH (copy_data = true, create_slot = true);"

      echo "local router replica is ready"

services:
  router-master-key-init:
    image: alpine:3.22.1
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /run/router-secrets
        key=/run/router-secrets/router-master-key.hex
        if [ ! -f "$$key" ]; then
          printf '%0128x' 1 > "$$key"
          chmod 600 "$$key"
        fi
    volumes:
      - router_local_master_key:/run/router-secrets
    restart: "no"

  router-postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: router_app
      POSTGRES_PASSWORD: router_app
      POSTGRES_DB: router_db
    ports:
      - "55432:5432"
    configs:
      - source: router-postgres-init
        target: /docker-entrypoint-initdb.d/001-router-init.sh
        mode: 0755
    volumes:
      - router_local_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U router_app -d router_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  token-indexer-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: token_indexer
    volumes:
      - router_local_token_indexer_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d token_indexer"]
      interval: 5s
      timeout: 5s
      retries: 20

  devnet:
    build:
      context: ..
      dockerfile: etc/Dockerfile.devnet
    command:
      - devnet
      - server
      - --fund-address
      - "0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266"
      - --loadgen-evm-key-count
      - "16"
      - --token-indexer-database-url
      - postgres://postgres:postgres@token-indexer-db:5432/token_indexer
    environment:
      EVM_TOKEN_INDEXER_API_KEY: local-token-indexer-api-key-000000000
    depends_on:
      token-indexer-db:
        condition: service_healthy
    ports:
      - "50100:50100"
      - "50101:50101"
      - "50102:50102"
      - "50103:50103"
      - "50104:50104"
      - "50105:50105"
      - "50106:50106"
      - "50107:50107"
      - "50108:50108"
      - "50110:50110"
      - "50111:50111"
      - "50112:50112"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:50108/status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 60s

  router-api:
    build:
      context: ..
      dockerfile: etc/Dockerfile.router-server
    command: ["router-api", "--host", "0.0.0.0", "--port", "4522"]
    depends_on:
      router-master-key-init:
        condition: service_completed_successfully
      router-postgres:
        condition: service_healthy
      devnet:
        condition: service_healthy
    environment: &router_env
      RUST_LOG: info
      DATABASE_URL: postgres://router_app:router_app@router-postgres:5432/router_db
      ROUTER_MASTER_KEY_PATH: /run/router-secrets/router-master-key.hex
      ETH_RPC_URL: http://devnet:50101
      BASE_RPC_URL: http://devnet:50102
      ARBITRUM_RPC_URL: http://devnet:50103
      BITCOIN_RPC_URL: http://devnet:50100
      BITCOIN_RPC_AUTH: devnet:devnet
      ELECTRUM_HTTP_SERVER_URL: http://devnet:50110
      BITCOIN_NETWORK: regtest
      ETHEREUM_PAYMASTER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      BASE_PAYMASTER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      ARBITRUM_PAYMASTER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      HYPERLIQUID_PAYMASTER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      ROUTER_DETECTOR_API_KEY: devnet-detector-key-000000000000
      ROUTER_GATEWAY_API_KEY: devnet-gateway-key-0000000000000000
      ROUTER_ADMIN_API_KEY: devnet-admin-key-0000000000000000
      ACROSS_API_URL: http://devnet:50107
      ACROSS_API_KEY: devnet-across
      ACROSS_INTEGRATOR_ID: rift-devnet
      CCTP_API_URL: http://devnet:50107
      CCTP_TOKEN_MESSENGER_V2_ADDRESS: "0xcccccccccccccccccccccccccccccccccccc0001"
      CCTP_MESSAGE_TRANSMITTER_V2_ADDRESS: "0xcccccccccccccccccccccccccccccccccccc0002"
      HYPERUNIT_API_URL: http://devnet:50107
      HYPERLIQUID_API_URL: http://devnet:50107
      HYPERLIQUID_NETWORK: testnet
      VELORA_API_URL: http://devnet:50107
      COINBASE_PRICE_API_BASE_URL: http://devnet:50107
      CORS_DOMAIN: "*"
    volumes:
      - router_local_master_key:/run/router-secrets:ro
    ports:
      - "4522:4522"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4522/status >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 40

  router-worker:
    build:
      context: ..
      dockerfile: etc/Dockerfile.router-server
    command: ["router-worker"]
    depends_on:
      router-api:
        condition: service_healthy
    environment:
      <<: *router_env
      ROUTER_WORKER_ID: local-router-worker
      ROUTER_WORKER_LEASE_SECONDS: 30
      ROUTER_WORKER_LEASE_RENEW_SECONDS: 5
      ROUTER_WORKER_STANDBY_POLL_SECONDS: 2
      ROUTER_WORKER_ROUTE_COST_REFRESH_SECONDS: 30
    volumes:
      - router_local_master_key:/run/router-secrets:ro

  router-postgres-replica:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: router_db
    ports:
      - "55433:5432"
    volumes:
      - router_local_postgres_replica:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d router_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  router-replica-setup:
    image: postgres:16
    depends_on:
      router-api:
        condition: service_healthy
      router-postgres-replica:
        condition: service_healthy
    configs:
      - source: local-replica-setup
        target: /setup.sh
        mode: 0755
    command: ["/setup.sh"]
    restart: "no"

  sauron-state-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sauron_state
    volumes:
      - router_local_sauron_state_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sauron_state"]
      interval: 5s
      timeout: 5s
      retries: 20

  sauron:
    build:
      context: ..
      dockerfile: etc/Dockerfile.sauron
    depends_on:
      router-replica-setup:
        condition: service_completed_successfully
      sauron-state-db:
        condition: service_healthy
      devnet:
        condition: service_healthy
    environment:
      RUST_LOG: info
      ROUTER_REPLICA_DATABASE_URL: postgres://postgres:postgres@router-postgres-replica:5432/router_db
      SAURON_STATE_DATABASE_URL: postgres://postgres:postgres@sauron-state-db:5432/sauron_state
      SAURON_REPLICA_EVENT_SOURCE: cdc
      SAURON_CDC_SLOT_NAME: sauron_watch_cdc
      ROUTER_CDC_PUBLICATION_NAME: router_cdc_publication
      ROUTER_CDC_MESSAGE_PREFIX: rift.router.change
      SAURON_BITCOIN_SCAN_INTERVAL_SECONDS: 2
      ROUTER_INTERNAL_BASE_URL: http://router-api:4522
      ROUTER_DETECTOR_API_KEY: devnet-detector-key-000000000000
      ELECTRUM_HTTP_SERVER_URL: http://devnet:50110
      BITCOIN_RPC_URL: http://devnet:50100
      BITCOIN_RPC_AUTH: devnet:devnet
      BITCOIN_ZMQ_RAWTX_ENDPOINT: tcp://devnet:50111
      BITCOIN_ZMQ_SEQUENCE_ENDPOINT: tcp://devnet:50112
      ETH_RPC_URL: http://devnet:50101
      BASE_RPC_URL: http://devnet:50102
      ARBITRUM_RPC_URL: http://devnet:50103
      ETHEREUM_TOKEN_INDEXER_URL: http://devnet:50104
      BASE_TOKEN_INDEXER_URL: http://devnet:50105
      ARBITRUM_TOKEN_INDEXER_URL: http://devnet:50106
      TOKEN_INDEXER_API_KEY: local-token-indexer-api-key-000000000

  router-gateway-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: router_gateway
    volumes:
      - router_local_gateway_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d router_gateway"]
      interval: 5s
      timeout: 5s
      retries: 20

  router-gateway:
    build:
      context: ..
      dockerfile: railway/router-gateway/Dockerfile
    depends_on:
      router-api:
        condition: service_healthy
      router-gateway-db:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      ROUTER_INTERNAL_BASE_URL: http://router-api:4522
      ROUTER_GATEWAY_API_KEY: devnet-gateway-key-0000000000000000
      ROUTER_GATEWAY_PUBLIC_BASE_URL: http://localhost:3001
      ROUTER_GATEWAY_DATABASE_URL: postgres://postgres:postgres@router-gateway-db:5432/router_gateway
      ROUTER_GATEWAY_CANCELLATION_SECRET_KEY: "2222222222222222222222222222222222222222222222222222222222222222"
      ROUTER_GATEWAY_BITCOIN_ADDRESS_NETWORKS: regtest
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 40

  admin-dashboard-auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admin_dashboard_auth
    volumes:
      - router_local_admin_auth_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d admin_dashboard_auth"]
      interval: 5s
      timeout: 5s
      retries: 20

  admin-dashboard-analytics-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admin_dashboard_analytics
    volumes:
      - router_local_admin_analytics_db:/var/lib/postgresql/data
    ports:
      - "55434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d admin_dashboard_analytics"]
      interval: 5s
      timeout: 5s
      retries: 20

  admin-dashboard:
    build:
      context: ..
      dockerfile: railway/admin-dashboard/Dockerfile
    depends_on:
      router-replica-setup:
        condition: service_completed_successfully
      admin-dashboard-auth-db:
        condition: service_healthy
      admin-dashboard-analytics-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      ADMIN_DASHBOARD_PRODUCTION: "false"
      ADMIN_DASHBOARD_ALLOW_INSECURE_DEV_AUTH_BYPASS: "true"
      HOST: 0.0.0.0
      PORT: 3000
      BETTER_AUTH_URL: http://localhost:3000
      ADMIN_DASHBOARD_WEB_ORIGIN: http://localhost:3000
      ADMIN_DASHBOARD_AUTH_DATABASE_URL: postgres://postgres:postgres@admin-dashboard-auth-db:5432/admin_dashboard_auth
      ADMIN_DASHBOARD_REPLICA_DATABASE_URL: postgres://postgres:postgres@router-postgres-replica:5432/router_db
      ADMIN_DASHBOARD_ANALYTICS_DATABASE_URL: postgres://postgres:postgres@admin-dashboard-analytics-db:5432/admin_dashboard_analytics
      ADMIN_DASHBOARD_CDC_SLOT_NAME: admin_dashboard_orders_cdc
      ROUTER_CDC_PUBLICATION_NAME: router_cdc_publication
      ROUTER_CDC_MESSAGE_PREFIX: rift.router.change
      ROUTER_ADMIN_API_KEY: devnet-admin-key-0000000000000000
      BETTER_AUTH_SECRET: local-admin-dashboard-secret-000000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/status >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 40

  router-loadgen:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: etc/Dockerfile.router-loadgen
    depends_on:
      router-gateway:
        condition: service_healthy
    environment:
      ROUTER_LOADGEN_GATEWAY_URL: http://router-gateway:3000
      ROUTER_LOADGEN_DEVNET_MANIFEST_URL: http://devnet:50108/manifest.json
      ROUTER_LOADGEN_BITCOIN_RPC_URL: http://devnet:50100/wallet/alice
      ROUTER_LOADGEN_BITCOIN_RPC_AUTH: devnet:devnet
    command:
      - create-and-fund
      - --random
      - --random-min-raw-amount
      - "100000000"
      - --random-max-raw-amount
      - "250000000"
      - --amount-format
      - raw
      - --to-address
      - "0x1111111111111111111111111111111111111111"
      - --evm-rpc
      - evm:1=http://devnet:50101
      - --evm-rpc
      - evm:8453=http://devnet:50102
      - --evm-rpc
      - evm:42161=http://devnet:50103

volumes:
  router_local_master_key:
  router_local_postgres:
  router_local_token_indexer_db:
  router_local_postgres_replica:
  router_local_sauron_state_db:
  router_local_gateway_db:
  router_local_admin_auth_db:
  router_local_admin_analytics_db:
