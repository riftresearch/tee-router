configs:
  stunnel-conf:
    content: |
      foreground = yes
      debug = 5

      [phala-router-postgres]
      client = yes
      accept = 0.0.0.0:5432
      connect = $${PHALA_DB_SNI}:443
      sni = $${PHALA_DB_SNI}
      verifyChain = no

  replica-setup:
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      echo "=== Router v3 Logical Replica Setup ==="

      PRIMARY_HOST="$${PRIMARY_DB_HOST:-stunnel-v3}"
      PRIMARY_PORT="$${PRIMARY_DB_PORT:-5432}"
      PRIMARY_DB="$${PRIMARY_DB_NAME:-router_db}"
      PRIMARY_USER="$${PRIMARY_DB_USER:-replicator}"
      PRIMARY_PASS="$${PRIMARY_DB_PASSWORD:?PRIMARY_DB_PASSWORD must be set}"
      PRIMARY_SSLMODE="$${PRIMARY_DB_SSLMODE:-prefer}"
      PRIMARY_PUBLICATION="$${PRIMARY_PUBLICATION:-router_all_tables}"

      REPLICA_HOST="$${REPLICA_DB_HOST:-router-postgres-replica-v3}"
      REPLICA_PORT="$${REPLICA_DB_PORT:-5432}"
      REPLICA_DB="$${REPLICA_DB_NAME:-router_db}"
      REPLICA_USER="$${REPLICA_DB_USER:-postgres}"
      REPLICA_PASS="$${REPLICA_DB_PASSWORD:?REPLICA_DB_PASSWORD must be set}"
      REPLICA_SSLMODE="$${REPLICA_DB_SSLMODE:-prefer}"
      REPLICA_SUBSCRIPTION="$${REPLICA_SUBSCRIPTION:-router_subscription}"

      PRIMARY_CONN="postgresql://$${PRIMARY_USER}:$${PRIMARY_PASS}@$${PRIMARY_HOST}:$${PRIMARY_PORT}/$${PRIMARY_DB}?sslmode=$${PRIMARY_SSLMODE}"
      REPLICA_ADMIN_CONN="postgresql://$${REPLICA_USER}:$${REPLICA_PASS}@$${REPLICA_HOST}:$${REPLICA_PORT}/postgres?sslmode=$${REPLICA_SSLMODE}"

      echo "Waiting for Phala primary router database..."
      attempt=0
      until psql "$${PRIMARY_CONN}" -c '\q' 2>/dev/null; do
        attempt=$$((attempt + 1))
        echo "[$${attempt}] primary unavailable; retrying in 2s"
        sleep 2
      done
      echo "Primary is reachable"

      echo "Waiting for Railway replica database..."
      until psql "$${REPLICA_ADMIN_CONN}" -c '\q' 2>/dev/null; do
        echo "replica unavailable; retrying in 2s"
        sleep 2
      done
      echo "Replica is reachable"

      echo "Ensuring replica database exists"
      psql "$${REPLICA_ADMIN_CONN}" <<-SQL
        SELECT 'CREATE DATABASE $${REPLICA_DB}'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '$${REPLICA_DB}')\gexec
      SQL

      REPLICA_DB_CONN="postgresql://$${REPLICA_USER}:$${REPLICA_PASS}@$${REPLICA_HOST}:$${REPLICA_PORT}/$${REPLICA_DB}?sslmode=$${REPLICA_SSLMODE}"

      echo "Checking primary publication"
      PUB_EXISTS=$$(psql "$${PRIMARY_CONN}" -tAc "SELECT COUNT(*) FROM pg_publication WHERE pubname = '$${PRIMARY_PUBLICATION}';")
      if [ "$${PUB_EXISTS}" -ne "1" ]; then
        echo "ERROR: primary publication '$${PRIMARY_PUBLICATION}' was not found" >&2
        exit 1
      fi

      echo "Copying or synchronizing primary schema"
      TABLES_EXIST=$$(psql "$${REPLICA_DB_CONN}" -tAc "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_name IN ('router_orders', 'deposit_vaults', 'market_order_quotes');")

      if [ "$${TABLES_EXIST}" -eq "3" ]; then
        echo "Core router tables already exist; syncing any missing schema objects"
        pg_dump "$${PRIMARY_CONN}" --schema-only --no-owner --no-privileges | \
          psql "$${REPLICA_DB_CONN}" 2>&1 | grep -v "already exists" || true
      else
        echo "Copying full primary schema"
        pg_dump "$${PRIMARY_CONN}" --schema-only --no-owner --no-privileges | \
          psql "$${REPLICA_DB_CONN}"
      fi

      echo "Creating logical subscription if missing"
      SUB_EXISTS=$$(psql "$${REPLICA_DB_CONN}" -tAc "SELECT COUNT(*) FROM pg_subscription WHERE subname = '$${REPLICA_SUBSCRIPTION}';")

      if [ "$${SUB_EXISTS}" -eq "0" ]; then
        SLOT_EXISTS=$$(psql "$${PRIMARY_CONN}" -tAc "SELECT COUNT(*) FROM pg_replication_slots WHERE slot_name = '$${REPLICA_SUBSCRIPTION}';")
        if [ "$${SLOT_EXISTS}" -eq "1" ]; then
          echo "Dropping orphaned primary replication slot '$${REPLICA_SUBSCRIPTION}'"
          psql "$${PRIMARY_CONN}" -c "SELECT pg_drop_replication_slot('$${REPLICA_SUBSCRIPTION}');"
        fi

        CONNECTION_STRING="host=$${PRIMARY_HOST} port=$${PRIMARY_PORT} dbname=$${PRIMARY_DB} user=$${PRIMARY_USER} password=$${PRIMARY_PASS} sslmode=$${PRIMARY_SSLMODE}"
        psql "$${REPLICA_DB_CONN}" <<-SQL
          CREATE SUBSCRIPTION $${REPLICA_SUBSCRIPTION}
            CONNECTION '$${CONNECTION_STRING}'
            PUBLICATION $${PRIMARY_PUBLICATION}
            WITH (copy_data = true, create_slot = true);
      SQL
        echo "Subscription '$${REPLICA_SUBSCRIPTION}' created"
      else
        echo "Subscription '$${REPLICA_SUBSCRIPTION}' already exists"
      fi

      echo "=== Replica Status ==="
      psql "$${REPLICA_DB_CONN}" -c "SELECT subname, subenabled, subslotname FROM pg_subscription WHERE subname = '$${REPLICA_SUBSCRIPTION}';"
      echo "Router v3 logical replica setup complete"

services:
  stunnel-v3:
    image: debian:bookworm-slim
    container_name: router-v3-stunnel
    environment:
      PHALA_DB_SNI: ${PHALA_DB_SNI:?set PHALA_DB_SNI}
    command:
      - /bin/bash
      - -ec
      - |
        apt-get update -qq
        apt-get install -y -qq stunnel4 gettext-base netcat-openbsd
        envsubst < /etc/stunnel/stunnel.conf.template > /etc/stunnel/stunnel.conf
        exec stunnel /etc/stunnel/stunnel.conf
    configs:
      - source: stunnel-conf
        target: /etc/stunnel/stunnel.conf.template
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - router-replica-network

  router-postgres-replica-v3:
    image: postgres:18-alpine
    container_name: router-postgres-replica-v3
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${REPLICA_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${REPLICA_DB_PASSWORD:?set REPLICA_DB_PASSWORD}
      POSTGRES_DB: ${REPLICA_DB_NAME:-router_db}
    ports:
      - "${REPLICA_DB_PUBLIC_PORT:-5433}:5432"
    volumes:
      - router_postgres_replica_v3_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - router-replica-network

  router-replica-setup-v3:
    image: postgres:18
    container_name: router-replica-setup-v3
    depends_on:
      stunnel-v3:
        condition: service_healthy
      router-postgres-replica-v3:
        condition: service_healthy
    environment:
      PRIMARY_DB_HOST: stunnel-v3
      PRIMARY_DB_PORT: ${PRIMARY_DB_PORT:-5432}
      PRIMARY_DB_NAME: ${PRIMARY_DB_NAME:-router_db}
      PRIMARY_DB_USER: ${PRIMARY_DB_USER:-replicator}
      PRIMARY_DB_PASSWORD: ${PRIMARY_DB_PASSWORD:?set PRIMARY_DB_PASSWORD}
      PRIMARY_DB_SSLMODE: ${PRIMARY_DB_SSLMODE:-prefer}
      PRIMARY_PUBLICATION: ${PRIMARY_PUBLICATION:-router_all_tables}
      REPLICA_DB_HOST: router-postgres-replica-v3
      REPLICA_DB_PORT: 5432
      REPLICA_DB_NAME: ${REPLICA_DB_NAME:-router_db}
      REPLICA_DB_USER: ${REPLICA_DB_USER:-postgres}
      REPLICA_DB_PASSWORD: ${REPLICA_DB_PASSWORD:?set REPLICA_DB_PASSWORD}
      REPLICA_DB_SSLMODE: ${REPLICA_DB_SSLMODE:-prefer}
      REPLICA_SUBSCRIPTION: ${REPLICA_SUBSCRIPTION:-router_subscription}
    configs:
      - source: replica-setup
        target: /setup.sh
        mode: 0755
    command: ["/setup.sh"]
    restart: "no"
    networks:
      - router-replica-network

networks:
  router-replica-network:

volumes:
  router_postgres_replica_v3_data:
