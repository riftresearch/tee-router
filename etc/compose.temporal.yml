x-temporal-server-base: &temporal-server-base
  image: temporalio/server:1.31.0
  depends_on:
    temporal-schema:
      condition: service_completed_successfully
  environment: &temporal-server-env
    DB: postgres12
    DB_PORT: 5432
    POSTGRES_USER: temporal
    POSTGRES_PWD: temporal
    POSTGRES_SEEDS: temporal-postgres
    BIND_ON_IP: 0.0.0.0
    DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    NUM_HISTORY_SHARDS: "512"
    SQL_MAX_CONNS: "64"
    SQL_MAX_IDLE_CONNS: "32"
    SQL_MAX_CONN_TIME: "5m"
    PROMETHEUS_ENDPOINT: 0.0.0.0:9090
  configs:
    - source: temporal-dynamic-config
      target: /etc/temporal/config/dynamicconfig/development-sql.yaml

configs:
  temporal-dynamic-config:
    content: |
      limit.maxIDLength:
        - value: 255
          constraints: {}
      system.forceSearchAttributesCacheRefreshOnRead:
        - value: true
          constraints: {}

      # Throughput ceilings -- raise from defaults (frontend 2400 / matching 1200 / history 3000)
      frontend.rps:
        - value: 4800
          constraints: {}
      matching.rps:
        - value: 2400
          constraints: {}
      history.rps:
        - value: 6000
          constraints: {}

      # Persistence QPS ceilings -- raise from defaults (frontend 2000 / matching+history 9000)
      frontend.persistenceMaxQPS:
        - value: 4000
          constraints: {}
      matching.persistenceMaxQPS:
        - value: 18000
          constraints: {}
      history.persistenceMaxQPS:
        - value: 18000
          constraints: {}

      # Task queue partitions -- raise from default 4 to match poller concurrency (~64-128)
      matching.numTaskqueueReadPartitions:
        - value: 16
          constraints: {}
      matching.numTaskqueueWritePartitions:
        - value: 16
          constraints: {}

      # History cache -- raise to reduce shard reload churn under load
      history.cacheMaxSize:
        - value: 4096
          constraints: {}
      history.eventsCacheMaxSizeBytes:
        - value: 1073741824   # 1 GiB
          constraints: {}

  temporal-setup-postgres:
    content: |
      #!/bin/sh
      set -eu

      : "$${POSTGRES_SEEDS:?POSTGRES_SEEDS is required}"
      : "$${POSTGRES_USER:?POSTGRES_USER is required}"

      echo "Waiting for PostgreSQL port..."
      nc -z -w 10 "$${POSTGRES_SEEDS}" "$${DB_PORT:-5432}"
      echo "PostgreSQL port is available"

      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal create
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal setup-schema -v 0.0
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal update-schema -d /etc/temporal/schema/postgresql/v12/temporal/versioned

      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility create
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility setup-schema -v 0.0
      temporal-sql-tool --plugin postgres12 --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" -p "$${DB_PORT:-5432}" --db temporal_visibility update-schema -d /etc/temporal/schema/postgresql/v12/visibility/versioned

      echo "PostgreSQL schema setup complete"

  temporal-create-namespace:
    content: |
      #!/bin/sh
      set -eu

      namespace="$${DEFAULT_NAMESPACE:-default}"
      temporal_address="$${TEMPORAL_ADDRESS:-temporal:7233}"
      max_attempts="$${TEMPORAL_HEALTH_CHECK_MAX_ATTEMPTS:-30}"
      sleep_seconds="$${TEMPORAL_HEALTH_CHECK_SLEEP_SECONDS:-5}"
      server_host="$$(echo "$${temporal_address}" | cut -d: -f1)"
      server_port="$$(echo "$${temporal_address}" | cut -d: -f2)"

      echo "Waiting for Temporal server port..."
      attempt=1
      while ! nc -z -w 10 "$${server_host}" "$${server_port}"; do
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Temporal server port did not become available after $${max_attempts} attempts"
          exit 1
        fi
        echo "Temporal server port not ready yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

      echo "Waiting for Temporal server health..."
      attempt=1
      while ! temporal operator cluster health --address "$${temporal_address}"; do
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Temporal server did not become healthy after $${max_attempts} attempts"
          exit 1
        fi
        echo "Temporal server not healthy yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

      echo "Ensuring Temporal namespace '$${namespace}' exists..."
      attempt=1
      while :; do
        if temporal operator namespace describe --namespace "$${namespace}" --address "$${temporal_address}" >/dev/null 2>&1; then
          echo "Namespace '$${namespace}' already exists"
          break
        fi
        if temporal operator namespace create --namespace "$${namespace}" --address "$${temporal_address}" >/dev/null 2>&1; then
          echo "Namespace '$${namespace}' created"
          break
        fi
        if [ "$${attempt}" -ge "$${max_attempts}" ]; then
          echo "Failed to create namespace '$${namespace}' after $${max_attempts} attempts"
          exit 1
        fi
        echo "Namespace operation not ready yet, waiting... (attempt $${attempt}/$${max_attempts})"
        attempt="$$(($${attempt} + 1))"
        sleep "$${sleep_seconds}"
      done

services:
  # numHistoryShards is fixed at first server start; changing it requires resetting the Temporal Postgres volume.
  temporal-postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - max_connections=800
      - -c
      - shared_buffers=512MB
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    ports:
      - "55435:5432"
    volumes:
      - router_local_temporal_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  temporal-schema:
    image: temporalio/admin-tools:1.31.0
    restart: "no"
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      SQL_PASSWORD: temporal
    configs:
      - source: temporal-setup-postgres
        target: /scripts/setup-postgres.sh
        mode: 0555
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres.sh

  temporal-history:
    <<: *temporal-server-base
    environment:
      <<: *temporal-server-env
      SERVICES: history
      TEMPORAL_BROADCAST_ADDRESS: temporal-history
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7234"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "13"

  temporal-matching:
    <<: *temporal-server-base
    environment:
      <<: *temporal-server-env
      SERVICES: matching
      TEMPORAL_BROADCAST_ADDRESS: temporal-matching
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7235"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "8"

  # This is Temporal's internal worker service, distinct from the app's Rust temporal-worker.
  temporal-internal-worker:
    <<: *temporal-server-base
    environment:
      <<: *temporal-server-env
      SERVICES: worker
      TEMPORAL_BROADCAST_ADDRESS: temporal-internal-worker
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7239"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "3"

  temporal:
    <<: *temporal-server-base
    environment:
      <<: *temporal-server-env
      SERVICES: frontend
      TEMPORAL_BROADCAST_ADDRESS: temporal
    ports:
      - "7233:7233"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "8"

  temporal-create-namespace:
    image: temporalio/admin-tools:1.31.0
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: default
    configs:
      - source: temporal-create-namespace
        target: /scripts/create-namespace.sh
        mode: 0555
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh

  temporal-ui:
    image: temporalio/ui:2.49.1
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

volumes:
  router_local_temporal_postgres:
